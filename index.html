    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chkLabel.appendChild(chk);
    chkLabel.appendChild(document.createTextNode(t().needsFirma));
    row.appendChild(chkLabel);
    form.appendChild(row);

    const actions = document.createElement('div');
    actions.className = 'actions';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn-cancel'; cancelBtn.textContent = t().cancelBtn;
    cancelBtn.addEventListener('click', ()=>{ addFormOpenFor = null; render(); });
    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn-save'; saveBtn.textContent = t().saveBtn;
    saveBtn.addEventListener('click', ()=>{
      const titleVal = titleInput.value.trim();
      if(!titleVal) return;
      const newItem = {id:uid(), title:titleVal, eco: ecoInput.value.trim() || null, firma: chk.checked, b: bauteilSelect.value, custom:true};
      if(catKey === 'jahr'){ customTasks.jahr[seasonKey].push(newItem); }
      else { customTasks[catKey].push(newItem); }
      saveCustomTasks();
      addFormOpenFor = null;
      render();
    });
    actions.appendChild(cancelBtn); actions.appendChild(saveBtn);
    form.appendChild(actions);
    container.appendChild(form);
  } else {
    const btn = document.createElement('button');
    btn.className = 'add-task-btn';
    btn.textContent = t().addTaskBtn;
    btn.addEventListener('click', ()=>{ addFormOpenFor = formKey; render(); });
    container.appendChild(btn);
  }
}

// Lead time before a due date/time at which a task starts showing up as a reminder.
const REMINDER_LEAD_DAYS = {jahr:19, quartal:5, monat:2, uebergabe:5};
const WEEKLY_LEAD_HOURS = 3;
let dismissedReminders = new Set(); // in-memory only, resets on reload

function computeActiveReminders(){
  const all = collectAllItems();
  const now = new Date();
  const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const active = [];

  all.forEach(item=>{
    const st = state[item.id];
    if(!st || !st.dueDate || st.done) return;
    if(dismissedReminders.has(item.id)) return;

    if(item.category === 'woche'){
      if(st.dueTime){
        const due = new Date(st.dueDate + 'T' + st.dueTime);
        const diffH = (due - now) / 3600000;
        if(diffH <= WEEKLY_LEAD_HOURS && diffH >= -1){
          active.push({item, whenLabel: diffH <= 0 ? t().todayLabel : fmt(t().inHoursTpl,{n:Math.ceil(diffH)}), isTask:true});
        }
      } else {
        const due = new Date(st.dueDate + 'T00:00:00');
        const dueMidnight = new Date(due.getFullYear(), due.getMonth(), due.getDate());
        const diffDays = Math.round((dueMidnight - todayMidnight)/86400000);
        if(diffDays === 0){
          active.push({item, whenLabel: t().todayLabel, isTask:true});
        }
      }
      return;
    }

    const due = new Date(st.dueDate + 'T00:00:00');
    const dueMidnight = new Date(due.getFullYear(), due.getMonth(), due.getDate());
    const diffDays = Math.round((dueMidnight - todayMidnight)/86400000);
    const lead = REMINDER_LEAD_DAYS[item.category] != null ? REMINDER_LEAD_DAYS[item.category] : 5;
    if(diffDays >= 0 && diffDays <= lead){
      active.push({item, whenLabel: diffDays === 0 ? t().todayLabel : fmt(t().inDaysTpl,{n:diffDays}), isTask:false});
    }
  });

  active.sort((a,b)=> (state[a.item.id].dueDate).localeCompare(state[b.item.id].dueDate));
  return active;
}

function timeToMinutes(t){ const [h,m] = t.split(':').map(Number); return h*60+m; }

function findConflict(date, startTime, endTime, vehicleId, excludeId){
  const s = timeToMinutes(startTime), e = timeToMinutes(endTime);
  return bookings.find(b=>{
    if(b.id === excludeId) return false;
    if(b.date !== date) return false;
    if((b.vehicleId || vehicles[0].id) !== vehicleId) return false;
    const bs = timeToMinutes(b.startTime), be = timeToMinutes(b.endTime);
    return s < be && bs < e; // Zeiträume überschneiden sich
  });
}

// Nächster Wartungstermin aus letzter Wartung + Intervall (Monate) berechnet.
// Gibt null zurück, wenn kein Intervall gepflegt ist.
function nextMaintenanceDate(it){
  const m = it.maintenance;
  if(!m || !m.intervalMonths) return null;
  const base = m.lastDate ? new Date(m.lastDate+'T00:00:00') : new Date(it.purchaseDate ? it.purchaseDate+'T00:00:00' : Date.now());
  const next = new Date(base);
  next.setMonth(next.getMonth() + m.intervalMonths);
  return next.toISOString().slice(0,10);
}

/* ================= Hauszustand / Health Score (V2 Phase 1) =================
   MVP-Berechnung aus dem, was aktuell an Daten existiert: erledigte vs.
   überfällige Aufgaben + Garantie-Status im Inventar. Sobald Wartungspläne
   (Phase 2) dazukommen, fließen die hier mit ein — die Funktion ist bewusst
   so gebaut, dass das ohne Strukturbruch ergänzt werden kann.
*/
function computeHealthScore(){
  const todayStr = new Date().toISOString().slice(0,10);
  const all = collectAllItems().filter(isTaskVisible);
  const withDue = all.filter(item => state[item.id] && state[item.id].dueDate);
  const overdue = withDue.filter(item => !state[item.id].done && state[item.id].dueDate < todayStr);
  const doneCount = all.filter(item => state[item.id] && state[item.id].done).length;

  const warnings = [];
  let score = 100;

  overdue.forEach(item=>{
    score -= 4;
    warnings.push({icon:'⚠️', text: fmt(t().healthOverdueTpl, {task: getTaskDisplay(item).title})});
  });

  inventory.forEach(it=>{
    if(!it.warrantyEnd) return;
    if(it.warrantyEnd < todayStr) return; // bereits abgelaufen zählt nicht doppelt gegen den Score, wird aber unten separat gezeigt
    const days = (new Date(it.warrantyEnd) - new Date(todayStr)) / 86400000;
    if(days <= 30){
      score -= 2;
      warnings.push({icon:'⏳', text: fmt(t().healthWarrantySoonTpl, {item: it.name})});
    }
  });

  const expiredWarranties = inventory.filter(it => it.warrantyEnd && it.warrantyEnd < todayStr);
  expiredWarranties.forEach(it=>{
    warnings.push({icon:'🛡', text: fmt(t().healthWarrantyExpiredTpl, {item: it.name})});
  });

  inventory.forEach(it=>{
    const next = nextMaintenanceDate(it);
    if(!next) return;
    if(next < todayStr){
      score -= 5;
      warnings.push({icon:'🔧', text: fmt(t().healthMaintenanceOverdueTpl, {item: it.name})});
    } else {
      const days = (new Date(next) - new Date(todayStr)) / 86400000;
      if(days <= 14){
        score -= 2;
        warnings.push({icon:'⏳', text: fmt(t().healthMaintenanceSoonTpl, {item: it.name})});
      }
    }
  });

  score = Math.max(0, Math.min(100, Math.round(score)));
  return { score, warnings, doneCount, total: all.length };
}

/* ================= Wartung & Ersatzteile (V2 Phase 2) =================
   Hängt direkt am Inventar-Eintrag (it.maintenance / it.parts), statt eine
   eigene Sync-Struktur zu sein — spart eine neue Merge-Logik, weil das
   ganze inventory-Objekt schon über mergeObjArrayById + Tombstones
   synchronisiert wird. Konsequenz (bewusst in Kauf genommen, wie auch bei
   Personen/Fahrzeugen/Buchungen): bearbeiten zwei Geräte GLEICHZEITIG
   dieselbe Wartung, gewinnt komplett eine Seite, kein Feld-für-Feld-Merge.
   Für eine Familien-App unproblematisch. */
/* ================= Dokumente (V2 Phase 3, lokal) =================
   Dateien selbst (Fotos, PDFs) leben NICHT im normalen contentObj()/
   localStorage-Fluss — das ist reiner Text und viel zu klein (5-10 MB
   insgesamt). Stattdessen: IndexedDB, das eigens für Blobs gemacht ist.
   Nur die METADATEN (Dateiname, Größe, Datum, verknüpfter Gegenstand)
   hängen am Inventar-Eintrag und werden ganz normal mitsynchronisiert —
   so weiß jedes Gerät "es gibt 3 Dokumente hier", auch wenn die Datei
   selbst nur auf dem Gerät liegt, das sie hochgeladen hat.

   WICHTIG (iOS-Hinweis, siehe Warnhinweis in der UI): Safari kann
   IndexedDB-Daten unter Speicherdruck löschen, wenn die App lange nicht
   geöffnet wurde. Für "zum Home-Bildschirm hinzugefügt"-Apps ist das
   Risiko geringer, aber nicht null. */
const DOC_DB_NAME = 'homesync-docs';
const DOC_STORE = 'documents';
const MAX_DOC_SIZE = 15 * 1024 * 1024; // 15 MB pro Datei — großzügig für Fotos/PDFs, aber nicht unbegrenzt

let _docDbPromise = null;
function openDocDB(){
  if(_docDbPromise) return _docDbPromise;
  _docDbPromise = new Promise((resolve, reject)=>{
    const req = indexedDB.open(DOC_DB_NAME, 1);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains(DOC_STORE)) db.createObjectStore(DOC_STORE, {keyPath:'id'});
    };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
  return _docDbPromise;
}
async function saveDocBlob(id, blob, filename, mimeType){
  const db = await openDocDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(DOC_STORE, 'readwrite');
    tx.objectStore(DOC_STORE).put({id, blob, filename, mimeType});
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = ()=> reject(tx.error);
  });
}
async function getDocBlob(id){
  const db = await openDocDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(DOC_STORE, 'readonly');
    const req = tx.objectStore(DOC_STORE).get(id);
    req.onsuccess = ()=> resolve(req.result || null);
    req.onerror = ()=> reject(req.error);
  });
}
async function deleteDocBlob(id){
  const db = await openDocDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(DOC_STORE, 'readwrite');
    tx.objectStore(DOC_STORE).delete(id);
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = ()=> reject(tx.error);
  });
}

/* ================= Barcode-Scanner (V2 Phase 3) =================
   Läuft komplett im Browser über die Kamera (ZXing, kein Server nötig,
   kein Internet für den Scan-Vorgang selbst). Liefert nur die Barcode-
   NUMMER — die automatische Produktnamen-Suche ("das ist eine Bosch-
   Waschmaschine XY") bräuchte eine externe, meist kostenpflichtige
   Produktdatenbank-API und ist bewusst nicht Teil dieser Version. */
let _zxingReader = null;
function openBarcodeScanner(onResult){
  if(typeof ZXing === 'undefined'){
    alert(t().invScanLibError);
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    alert(t().invScanNoCamera);
    return;
  }

  const overlay = document.createElement('div');
  overlay.style.position = 'fixed'; overlay.style.inset = '0'; overlay.style.background = '#000';
  overlay.style.zIndex = '999'; overlay.style.display = 'flex'; overlay.style.flexDirection = 'column';

  const video = document.createElement('video');
  video.style.flex = '1'; video.style.width = '100%'; video.style.objectFit = 'cover';
  video.setAttribute('playsinline', 'true'); video.setAttribute('muted', 'true');
  overlay.appendChild(video);

  const bar = document.createElement('div');
  bar.style.padding = '14px'; bar.style.paddingBottom = 'calc(14px + env(safe-area-inset-bottom))';
  bar.style.background = '#111'; bar.style.display = 'flex'; bar.style.justifyContent = 'space-between'; bar.style.alignItems = 'center';
  const hint = document.createElement('span');
  hint.style.color = '#fff'; hint.style.fontSize = '13px';
  hint.textContent = t().invScanHint;
  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn-cancel';
  closeBtn.textContent = t().cancelBtn;
  bar.appendChild(hint); bar.appendChild(closeBtn);
  overlay.appendChild(bar);

  document.body.appendChild(overlay);

  let stopped = false;
  const reader = new ZXing.BrowserMultiFormatReader();
  _zxingReader = reader;

  function cleanup(){
    stopped = true;
    try{ reader.reset(); }catch(e){}
    overlay.remove();
  }
  closeBtn.addEventListener('click', cleanup);

  reader.decodeFromVideoDevice(undefined, video, (result, err)=>{
    if(stopped) return;
    if(result){
      const code = result.getText();
      cleanup();
      onResult(code);
    }
    // NotFoundException feuert bei jedem Frame ohne erkannten Code — das
    // ist der Normalfall während des Suchens, keine echte Fehlermeldung.
    if(err && !(err instanceof ZXing.NotFoundException)){
      console.warn('Barcode-Scan:', err);
    }
  }).catch(err=>{
    console.warn('Kamera konnte nicht gestartet werden:', err);
    cleanup();
    alert(t().invScanCameraError);
  });
}

function humanFileSize(bytes){
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function ensureMaintenanceShape(it){
  if(!it.maintenance) it.maintenance = {lastDate:'', intervalMonths:null, history:[]};
  if(!it.maintenance.history) it.maintenance.history = [];

}

function renderDocumentList(docs){

    rm.addEventListener('click', async ()=>{

      await deleteDocBlob(doc.id);
      saveDocuments(); render();
    });
    row.appendChild(rm);

    wrap.appendChild(row);
  });
  return wrap;
}

/* ================= Dokument scannen: Foto → OCR → PDF (V2 Phase 3) =================
   Bewusst OHNE automatische Kantenerkennung (siehe Absprache) — reines Foto,
   danach Texterkennung und PDF-Erzeugung, beides komplett im Browser (Tesseract.js
   / jsPDF), kein Server beteiligt. OCR-Text wird nur als durchsuchbares Metadatum
   in der App gespeichert, nicht als echte Text-Ebene im PDF selbst (das PDF ist
   ein reines Bild-PDF — eine "unsichtbare Text-Ebene passend zum Bild" wäre ein
   deutlich größerer Zusatzaufwand für wenig zusätzlichen Nutzen hier). */
function openDocumentScanner(onDone){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    alert(t().invScanNoCamera);
    return;
  }

  const overlay = document.createElement('div');
  overlay.style.position = 'fixed'; overlay.style.inset = '0'; overlay.style.background = '#000';
  overlay.style.zIndex = '999'; overlay.style.display = 'flex'; overlay.style.flexDirection = 'column';

  const video = document.createElement('video');
  video.style.flex = '1'; video.style.width = '100%'; video.style.objectFit = 'cover';
  video.setAttribute('playsinline', 'true'); video.setAttribute('muted', 'true');
  overlay.appendChild(video);

  const statusLine = document.createElement('div');
  statusLine.style.color = '#fff'; statusLine.style.fontSize = '13px'; statusLine.style.textAlign = 'center'; statusLine.style.padding = '8px';
  statusLine.textContent = t().docScanHint;
  overlay.appendChild(statusLine);

  const bar = document.createElement('div');
  bar.style.padding = '14px'; bar.style.paddingBottom = 'calc(14px + env(safe-area-inset-bottom))';
  bar.style.background = '#111'; bar.style.display = 'flex'; bar.style.justifyContent = 'space-between'; bar.style.alignItems = 'center'; bar.style.gap = '10px';
  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn-cancel';
  closeBtn.textContent = t().cancelBtn;
  const shootBtn = document.createElement('button');
  shootBtn.className = 'btn-save';
  shootBtn.textContent = '📸 ' + t().docScanShoot;
  bar.appendChild(closeBtn); bar.appendChild(shootBtn);
  overlay.appendChild(bar);

  document.body.appendChild(overlay);

  let stream = null;
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
    .then(s=>{ stream = s; video.srcObject = s; video.play(); })
    .catch(err=>{
      console.warn('Kamera konnte nicht gestartet werden:', err);
      cleanup();
      alert(t().invScanCameraError);
    });

  function cleanup(){
    if(stream) stream.getTracks().forEach(t=>t.stop());
    overlay.remove();
  }
  closeBtn.addEventListener('click', cleanup);

  shootBtn.addEventListener('click', async ()=>{
    shootBtn.disabled = true; closeBtn.disabled = true;
    statusLine.textContent = t().docScanProcessing;

    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    if(stream) stream.getTracks().forEach(t=>t.stop());

    let ocrText = '';
    try{
      if(typeof Tesseract !== 'undefined'){
        const ocrLang = (lang === 'de') ? 'deu' : (lang === 'it' ? 'ita' : lang === 'fr' ? 'fra' : lang === 'sv' ? 'swe' : lang === 'no' ? 'nor' : 'eng');
        const { data } = await Tesseract.recognize(canvas, ocrLang);
        ocrText = (data && data.text) ? data.text.trim() : '';
      }
    }catch(err){
      console.warn('OCR fehlgeschlagen (Dokument wird trotzdem ohne Text gespeichert):', err);
    }

    try{
      const imgData = canvas.toDataURL('image/jpeg', 0.85);
      const { jsPDF } = window.jspdf;
      const orientation = canvas.width > canvas.height ? 'l' : 'p';
      const pdf = new jsPDF({orientation, unit:'px', format:[canvas.width, canvas.height]});
      pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height);
      const blob = pdf.output('blob');
      const filename = 'scan-' + new Date().toISOString().slice(0,10) + '-' + Math.random().toString(36).slice(2,6) + '.pdf';
      cleanup();
      onDone({blob, filename, ocrText});
    }catch(err){
      console.warn('PDF-Erzeugung fehlgeschlagen:', err);
      cleanup();
      alert(t().docScanPdfError);
    }
  });
}

  head.appendChild(title);

  if(needed.length){
    const copyBtn = document.createElement('button');
    copyBtn.className = 'add-task-btn';
    copyBtn.style.fontSize = '12px'; copyBtn.style.padding = '5px 10px';
    copyBtn.textContent = t().shoppingListCopy;
    copyBtn.addEventListener('click', async ()=>{
      const text = needed.map(n => '- ' + n.part.name + ' (' + n.item.name + ')').join('\n');
      try{
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = t().shoppingListCopied;
        setTimeout(()=>{ copyBtn.textContent = t().shoppingListCopy; }, 1500);
      }catch(e){
        alert(text); // Fallback, falls Zwischenablage nicht erlaubt ist
      }
    });
    head.appendChild(copyBtn);
  }
  card.appendChild(head);

  if(!needed.length){
    const ok = document.createElement('div');
    ok.style.marginTop = '8px'; ok.style.fontSize = '12.5px'; ok.style.color = 'var(--leaf)';
    ok.textContent = '✅ ' + t().shoppingListEmpty;
    card.appendChild(ok);
    return card;
  }

  const list = document.createElement('div');
  list.style.marginTop = '10px'; list.style.display = 'flex'; list.style.flexDirection = 'column'; list.style.gap = '5px';
  needed.forEach(({item, part})=>{
    const row = document.createElement('label');
    row.style.display = 'flex'; row.style.alignItems = 'center'; row.style.gap = '6px'; row.style.fontSize = '13px';
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.addEventListener('change', ()=>{
      part.checked = true; // "gekauft" = im jeweiligen Inventar-Eintrag abhaken, keine separate Kopie
      saveInventory(); render();
    });
    const span = document.createElement('span');
    span.textContent = part.name + ' — ' + item.name;
    row.appendChild(chk); row.appendChild(span);
    list.appendChild(row);
  });
  card.appendChild(list);
  return card;
}

/* ================= Task area dispatcher ================= */
const ALLTAG_BAUTEILE = ['haushalt','garten','garage'];
const HAUS_BAUTEIL_KEYS = BAUTEIL_KEYS.filter(k => !ALLTAG_BAUTEILE.includes(k));

function renderFilterRow(area){
  const row = document.createElement('div');
  row.className = 'filter-row';
  const allChip = document.createElement('button');
  allChip.className = 'filter-chip' + (activeBauteilFilter===null ? ' active':'');
  allChip.textContent = t().filterAll;
  allChip.addEventListener('click', ()=>{ activeBauteilFilter = null; render(); });
  row.appendChild(allChip);
  HAUS_BAUTEIL_KEYS.forEach(bk=>{
    const chip = document.createElement('button');
    chip.className = 'filter-chip' + (activeBauteilFilter===bk ? ' active':'');
    chip.textContent = t().bauteil[bk];
    chip.addEventListener('click', ()=>{ activeBauteilFilter = (activeBauteilFilter===bk ? null : bk); render(); });
    row.appendChild(chip);
  });
  area.appendChild(row);
}
function passesFilter(item){
  if(!isTaskVisible(item)) return false;
  if(ALLTAG_BAUTEILE.includes(item.b)) return false; // Haushalt/Garten/Garage leben jetzt im Alltag-Modus
  if(activeBauteilFilter && item.b !== activeBauteilFilter) return false;
  return true;
}

// Sammelt alle Aufgaben (egal aus welcher Jahreszeit/welchem Zeitraster) mit einem
// bestimmten Bauteil-Tag — Basis für die Alltag-Bereiche Haushalt/Garten/Garage.
function collectByBauteil(bauteilKey){
  const items = [];
  const active = activatedCatalog[bauteilKey] || [];
  SEASON_KEYS.forEach(sk=>{
    STRUCT.jahr[sk].forEach(i=>{ if(i.b===bauteilKey && active.includes(i.id)) items.push({...i, category:'jahr', season:sk}); });
    (customTasks.jahr[sk]||[]).forEach(i=>{ if(i.b===bauteilKey) items.push({...i, category:'jahr', season:sk, categoryPath:['jahr',sk]}); });
  });
  ['quartal','monat','woche'].forEach(c=>{
    STRUCT[c].forEach(i=>{ if(i.b===bauteilKey && active.includes(i.id)) items.push({...i, category:c}); });
    (customTasks[c]||[]).forEach(i=>{ if(i.b===bauteilKey) items.push({...i, category:c, categoryPath:[c]}); });
  });
  (CATALOG_STRUCT[bauteilKey]||[]).forEach(i=>{
    if(active.includes(i.id)){
      items.push({...i, category:'woche', fromCatalog:true, categoryPath:['catalog',bauteilKey]});
    }
  });
  return items.filter(isTaskVisible);
}

// Alle wählbaren Katalog-Einträge für einen Alltag-Bereich: die eingebauten (übersetzt via TXT)
// plus die zusätzliche lange Liste (CATALOG_TXT) — beide erscheinen zusammen in der Auf-/Zuklapp-Auswahl.
function getCatalogOptionsFor(bauteilKey){
  const opts = [];
  SEASON_KEYS.forEach(sk=> STRUCT.jahr[sk].forEach(i=>{ if(i.b===bauteilKey) opts.push({id:i.id, gate:i.gate, fromCatalog:false}); }));
  ['quartal','monat','woche'].forEach(c=> STRUCT[c].forEach(i=>{ if(i.b===bauteilKey) opts.push({id:i.id, gate:i.gate, fromCatalog:false}); }));
  (CATALOG_STRUCT[bauteilKey]||[]).forEach(i=> opts.push({id:i.id, gate:null, fromCatalog:true}));
  return opts.filter(o => !o.gate || houseInfo[o.gate]);
}
function catalogOptionText(opt){
  return opt.fromCatalog ? CATALOG_TXT[lang][opt.id].t : TXT[lang][opt.id].t;
}

// Reihenfolge für die Pfeile hoch/runter: gespeicherte Reihenfolge zuerst, neue Einträge hängen sich hinten an.
function sortByOrder(bauteilKey, items){
  const ids = items.map(i=>i.id);
  const stored = (taskOrder[bauteilKey]||[]).filter(id=>ids.includes(id));
  const missing = ids.filter(id=>!stored.includes(id));
  const order = [...stored, ...missing];
  const map = {}; items.forEach(i=>{ map[i.id]=i; });
  return order.map(id=>map[id]);
}
function moveItem(bauteilKey, orderedIds, itemId, dir){
  const idx = orderedIds.indexOf(itemId);
  const swapIdx = idx + dir;
  if(swapIdx < 0 || swapIdx >= orderedIds.length) return;
  const newOrder = orderedIds.slice();
  [newOrder[idx], newOrder[swapIdx]] = [newOrder[swapIdx], newOrder[idx]];
  taskOrder[bauteilKey] = newOrder;
  saveTaskOrder();
  render();
}

function renderBauteilGrid(bauteilKey){
  const area = document.getElementById('taskArea');
  const items = sortByOrder(bauteilKey, collectByBauteil(bauteilKey));
  if(!items.length){
    const d = document.createElement('div');
    d.className = 'empty-hint';
    d.textContent = t().emptyHint;
    area.appendChild(d);
  } else {
    const orderedIds = items.map(i=>i.id);
    items.forEach((item, idx) => area.appendChild(taskRow(item, {
      showReorder: true,
      disableUp: idx === 0,
      disableDown: idx === items.length - 1,
      onUp: ()=> moveItem(bauteilKey, orderedIds, item.id, -1),
      onDown: ()=> moveItem(bauteilKey, orderedIds, item.id, 1),
    })));
  }

  const details = document.createElement('details');
  details.className = 'catalog-details';
  if(catalogPickerOpen === bauteilKey) details.setAttribute('open', '');
  details.addEventListener('toggle', ()=>{ catalogPickerOpen = details.open ? bauteilKey : null; });

  const summary = document.createElement('summary');
  summary.textContent = t().addTaskBtn;
  details.appendChild(summary);

  const panel = document.createElement('div');
  panel.className = 'add-task-form';

  const grid = document.createElement('div');
  grid.className = 'template-grid';
  getCatalogOptionsFor(bauteilKey).forEach(ci=>{
    const active = (activatedCatalog[bauteilKey]||[]).includes(ci.id);
    const tile = document.createElement('button');
    tile.type = 'button';
    tile.className = 'template-tile' + (active ? ' active' : '');
    if(active){
      const badge = document.createElement('span');
      badge.className = 'template-badge';
      badge.textContent = '✓';
      tile.appendChild(badge);
    }
    const icon = document.createElement('span');
    icon.className = 'template-icon';
    icon.textContent = TASK_ICON[ci.id] || BAUTEIL_ICON[bauteilKey] || '○';
    const label = document.createElement('span');
    label.className = 'template-label';
    label.textContent = catalogOptionText(ci);
    tile.appendChild(icon); tile.appendChild(label);
    tile.addEventListener('click', ()=>{
      if(!activatedCatalog[bauteilKey]) activatedCatalog[bauteilKey] = [];
      if(!deactivatedCatalog[bauteilKey]) deactivatedCatalog[bauteilKey] = [];
      if(active){
        // Abwählen: aus der aktiven Liste raus, als Tombstone merken —
        // sonst würde der nächste Sync es aus der Cloud-Kopie wieder reinholen.
        activatedCatalog[bauteilKey] = activatedCatalog[bauteilKey].filter(x=>x!==ci.id);
        if(!deactivatedCatalog[bauteilKey].includes(ci.id)) deactivatedCatalog[bauteilKey].push(ci.id);
      } else {
        // Wieder aktivieren: Tombstone entfernen, sonst würde die
        // Deaktivierung bei einem späteren Merge wieder gewinnen.
        deactivatedCatalog[bauteilKey] = deactivatedCatalog[bauteilKey].filter(x=>x!==ci.id);
        activatedCatalog[bauteilKey].push(ci.id);
      }
      saveActivatedCatalog();
      catalogPickerOpen = bauteilKey; // Auswahl bleibt beim Antippen offen
      render();
    });
    grid.appendChild(tile);
  });
  panel.appendChild(grid);

  const customRow = document.createElement('div');
  customRow.className = 'row';
  const customInput = document.createElement('input');
  customInput.type = 'text'; customInput.placeholder = t().newTaskPh; customInput.maxLength = 200;
  const customAddBtn = document.createElement('button');
  customAddBtn.className = 'btn-save'; customAddBtn.textContent = '+';
  const addCustom = ()=>{
    const val = customInput.value.trim();
    if(!val) return;
    customTasks.woche.push({id:uid(), title:val, eco:null, firma:false, b:bauteilKey, custom:true});
    saveCustomTasks();
    catalogPickerOpen = bauteilKey;
    render();
  };
  customAddBtn.addEventListener('click', addCustom);
  customInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') addCustom(); });
  customRow.appendChild(customInput); customRow.appendChild(customAddBtn);
  panel.appendChild(customRow);

  details.appendChild(panel);
  area.appendChild(details);
}

function renderTaskArea(){
  const area = document.getElementById('taskArea');
  area.innerHTML = '';
  if(activeTab === 'haus'){ renderHausTab(); return; }
  if(activeTab === 'inventar'){ renderInventarTab(); return; }
  if(activeTab === 'dokumente'){ renderDokumenteTab(); return; }
  if(activeTab === 'kalender'){ renderKalenderTab(); return; }
  if(activeTab === 'auto'){ renderAutoTab(); return; }
  if(activeTab.startsWith('b-')){ renderBauteilGrid(activeTab.slice(2)); return; }

  if(activeTab === 'jahr'){
    const key = activeSeason || currentSeasonKey();
    renderFilterRow(area);
    const structItems = STRUCT.jahr[key].filter(passesFilter);
    const custItems = (customTasks.jahr[key]||[]).filter(passesFilter);
    if(activeBauteilFilter && structItems.length===0 && custItems.length===0){
      const d = document.createElement('div'); d.className = 'empty-hint'; d.textContent = t().emptyHint; area.appendChild(d);
    }
    structItems.forEach(item => area.appendChild(taskRow({...item, category:'jahr', season:key})));
    custItems.forEach(item => area.appendChild(taskRow({...item, category:'jahr', season:key, categoryPath:['jahr',key]})));
    renderAddTaskAffordance(area, 'jahr', key);
    return;
  }
  const list = STRUCT[activeTab];
  if(!list){
    const d = document.createElement('div');
    d.className = 'empty-hint';
    d.textContent = t().emptyHint;
    area.appendChild(d);
    return;
  }
  renderFilterRow(area);
  const structItems2 = list.filter(passesFilter);
  const custItems2 = (customTasks[activeTab]||[]).filter(passesFilter);
  if(activeBauteilFilter && structItems2.length===0 && custItems2.length===0){
    const d = document.createElement('div'); d.className = 'empty-hint'; d.textContent = t().emptyHint; area.appendChild(d);
  }
  structItems2.forEach(item => area.appendChild(taskRow({...item, category:activeTab})));
  custItems2.forEach(item => area.appendChild(taskRow({...item, category:activeTab, categoryPath:[activeTab]})));
  renderAddTaskAffordance(area, activeTab, null);
}

  });

}

// Diagnose-Netz: JEDER unerwartete Fehler landet ab jetzt sichtbar in der

  console.error('[global error]', e.message, e.filename + ':' + e.lineno);

});
window.addEventListener('unhandledrejection', (e)=>{
  console.error('[unhandled promise rejection]', e.reason);
  const msg = (e.reason && (e.reason.message || e.reason.error_description || e.reason.details)) || String(e.reason);
  setSyncStatus('⚠️ ' + msg);
});
