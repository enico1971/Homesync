<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>HomeSync</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HomeSync">
<meta name="theme-color" content="#1B211C">
<meta name="color-scheme" content="light dark">
<!-- Defense-in-depth: no XSS was found in this app (all dynamic content is
     set via textContent/DOM APIs, not innerHTML with user data), but a CSP
     still blocks exfiltration to unexpected hosts. NOTE: this app's entire
     logic lives in one inline <script> block (no external bundle), so
     script-src needs 'unsafe-inline' — a strict nonce/hash-based CSP isn't
     practical without introducing a build step for this file. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; worker-src 'self' https://cdn.jsdelivr.net blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://bvhcdhbqpzgkmsdzxctg.supabase.co https://cdn.jsdelivr.net https://tessdata.projectnaptha.com; base-uri 'self'; form-action 'none'; frame-ancestors 'none'">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@4.2.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root{
    --paper:#EDEEE6; --paper-2:#E4E6DA; --ink:#24312A; --ink-soft:#5B6B60; --line:#C9CDBE;
    --spring:#7FA37A; --summer:#D9A441; --autumn:#B85C38; --winter:#4C6B8A;
    --card:#F7F7F1; --leaf:#5C7A4F; --leaf-bg:#E7EEDF; --leaf-border:#C7D6BC; --rust:#B85C38;
    --wheel-label:#F7F7F1;
    --mode-accent: var(--spring);
    /* Kontrastsichere Text-Varianten für Status/Warnungen (WCAG 2.1, mind. 4.5:1
       auf --paper/--card geprüft). Die Original-Farben oben bleiben für
       dekorative Zwecke (Jahreszeiten-Rad, Kategorie-Punkte) unverändert —
       da gelten die strengen Text-Kontrastregeln nicht in gleicher Form. */
    --rust-text:#A85433; --summer-text:#8C651C; --leaf-text:#56724A;
  }
  body.mode-haus{ --mode-accent: var(--autumn); }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#1B211C; --paper-2:#252C26; --ink:#EAEDE7; --ink-soft:#93A092; --line:#3A433C;
      --spring:#6E9868; --summer:#C6963A; --autumn:#A85434; --winter:#4A6784;
      --card:#232A24; --leaf:#8FBF83; --leaf-bg:#243024; --leaf-border:#3B4E38; --rust:#C77A5B;
      --wheel-label:#EAEDE7;
      /* Im Dunkelmodus sind die Original-Farben schon kontrastreich genug
         (geprüft ≥4.5:1) — Text-Varianten zeigen hier bewusst auf dieselben
         Werte, damit im JS immer dieselbe Variable verwendet werden kann. */
      --rust-text:#C77A5B; --summer-text:#C6963A; --leaf-text:#8FBF83;
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{-webkit-overflow-scrolling:touch;overscroll-behavior-y:none;}
  button,.profile-btn,[role="button"],.catalog-tile,.icon-tile{touch-action:manipulation;transition:transform .08s ease,opacity .08s ease;}
  button:active,.profile-btn:active,.catalog-tile:active,.icon-tile:active{transform:scale(0.96);opacity:.85;}
  body.modal-open{position:fixed;inset:0;overflow:hidden;}
  html{background:var(--paper);}
  .cloud-sync-card{background:var(--leaf-bg);border:1px solid var(--leaf-border);border-radius:14px;padding:16px;margin-bottom:18px;position:relative;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;padding:20px;z-index:200;}
  .modal-box{background:var(--paper);border-radius:16px;padding:20px;max-width:380px;width:100%;position:relative;max-height:85vh;overflow-y:auto;}
  .modal-close{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;background:var(--card);border:1px solid var(--line);color:var(--ink-soft);font-size:16px;line-height:1;cursor:pointer;}
  .cloud-sync-close{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;background:var(--card);border:1px solid var(--leaf-border);color:var(--ink-soft);font-size:15px;line-height:1;cursor:pointer;}
  .cloud-sync-pill{display:inline-flex;align-items:center;gap:6px;background:var(--leaf-bg);border:1px solid var(--leaf-border);border-radius:20px;padding:6px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--leaf);cursor:pointer;margin-bottom:14px;}
  .cloud-sync-title{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--leaf);}
  .cloud-sync-card input[type=email],.cloud-sync-card input[type=text]{width:100%;font-family:'Work Sans',sans-serif;font-size:16px;border:1px solid var(--line);border-radius:10px;padding:12px;background:var(--card);color:var(--ink);outline:none;}
  #cloudJoinCode{letter-spacing:6px;text-align:center;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
  .join-code-display{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:600;letter-spacing:8px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;color:var(--ink);text-align:center;}
  .sync-status{position:fixed;bottom:calc(10px + env(safe-area-inset-bottom));right:10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);border-radius:8px;padding:4px 8px;opacity:.85;z-index:50;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Work Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
  .display{font-family:'Fraunces',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .wrap{max-width:740px;margin:0 auto;padding:calc(28px + env(safe-area-inset-top)) 20px calc(80px + env(safe-area-inset-bottom));}

  header{margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-start;gap:14px;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;}
  h1{font-size:32px;font-weight:600;margin:0;line-height:1.05;}
  .sub{color:var(--ink-soft);font-size:14px;margin-top:6px;max-width:46ch;}
  .header-actions{display:flex;align-items:center;gap:8px;}
  .profile-btn{position:relative;font-size:18px;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer;line-height:1;}
  .profile-btn.is-connected::after{content:'';position:absolute;top:2px;right:2px;width:9px;height:9px;border-radius:50%;background:#2ecc71;box-shadow:0 0 0 2px var(--card),0 0 6px #2ecc71;}
  .lang-select{font-family:'Work Sans',sans-serif;font-size:16px;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:6px 8px;color:var(--ink);flex:0 0 auto;}
  .eco-toggle{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);cursor:pointer;margin-top:6px;justify-content:flex-end;}
  .eco-toggle input{width:14px;height:14px;}

  .mode-switch{display:flex;gap:0;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:4px;margin-bottom:16px;}
  .mode-btn{flex:1;text-align:center;font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.03em;padding:10px 6px;border-radius:10px;background:none;border:none;cursor:pointer;color:var(--ink-soft);}
  .mode-btn.active{background:var(--mode-accent);color:var(--paper);}

  .view-toggle-row{display:flex;justify-content:flex-end;margin-bottom:10px;}
  .view-toggle-btn{font-family:'JetBrains Mono',monospace;font-size:12px;background:none;border:1px solid var(--line);border-radius:8px;padding:5px 10px;cursor:pointer;color:var(--ink-soft);}

  .icon-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  @media (max-width:340px){.icon-grid{grid-template-columns:repeat(1,1fr);}}
  .icon-tile{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 10px 18px;text-align:center;cursor:pointer;min-height:44px;}
  .icon-tile.done{background:var(--leaf-bg);border-color:var(--leaf-border);}
  .icon-tile .icon-emoji{font-size:42px;line-height:1;}
  .icon-tile .icon-label{font-size:15px;margin-top:10px;line-height:1.3;min-height:2.4em;display:flex;align-items:center;justify-content:center;}
  .icon-tile.done .icon-label{color:var(--leaf);}
  .icon-tile .icon-badge{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;background:var(--ink);color:var(--paper);font-size:13px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;}
  .icon-tile .icon-check{position:absolute;top:10px;left:10px;font-size:17px;}

  .wheel-section{display:flex;align-items:center;gap:22px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;margin:22px 0 18px;}
  #wheel{flex:0 0 auto;cursor:pointer;}
  .wheel-seg{transition:opacity .2s ease;transform-origin:100px 100px;}
  .wheel-seg:hover{opacity:.85;}
  .wheel-label{font-family:'JetBrains Mono',monospace;font-size:9.5px;fill:var(--wheel-label);text-transform:uppercase;letter-spacing:.05em;}
  .wheel-info{flex:1;}
  .wheel-info .season-name{font-size:22px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .wheel-info p{color:var(--ink-soft);font-size:13.5px;margin:6px 0 0;line-height:1.5;}

  .tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:18px;overflow-x:auto;}
  .tab{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.04em;text-transform:uppercase;padding:10px 4px 12px;color:var(--ink-soft);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;}
  .tab.active{color:var(--ink);border-bottom-color:var(--mode-accent);border-bottom-width:3px;}

  .section-intro{color:var(--ink-soft);font-size:13px;line-height:1.5;margin-bottom:14px;}
  .field-label{color:var(--ink-soft);font-size:11.5px;}

  .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media (max-width:520px){.profile-grid{grid-template-columns:1fr;}}
  .field{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;}
  .field label{display:block;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:4px;}
  .field input,.field textarea,.field select{width:100%;border:none;background:none;font-family:'Work Sans',sans-serif;font-size:16px;color:var(--ink);padding:0;outline:none;}
  .twin-title{font-family:'Fraunces',serif;font-size:15px;font-weight:600;margin:22px 0 8px;color:var(--ink-soft);}
  .twin-intro{color:var(--ink-soft);font-size:13px;line-height:1.5;margin-bottom:12px;}
  .toggle-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
  .toggle-item{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:7px 12px;font-size:13px;cursor:pointer;}
  .toggle-item input{width:16px;height:16px;}
  .field textarea{resize:vertical;min-height:44px;font-size:13px;}
  .warranty-banner{margin-top:14px;padding:12px 14px;border-radius:12px;background:var(--leaf-bg);border:1px solid var(--leaf-border);font-size:13px;color:var(--leaf);display:flex;gap:8px;align-items:baseline;}
  .warranty-banner .mono{font-size:12px;}

  .people-title{font-family:'Fraunces',serif;font-size:15px;font-weight:600;margin:22px 0 8px;color:var(--ink-soft);}
  .people-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .chip{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:6px 8px 6px 12px;font-size:13px;}
  .chip button{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:13px;line-height:1;padding:2px;}
  .add-person{display:flex;gap:6px;align-items:center;}
  .add-person input{font-family:'Work Sans',sans-serif;font-size:16px;border:1px solid var(--line);background:var(--card);border-radius:20px;padding:7px 12px;outline:none;color:var(--ink);}
  .add-person button{font-family:'JetBrains Mono',monospace;font-size:12.5px;border:1px solid var(--ink);background:var(--ink);color:var(--paper);border-radius:20px;padding:7px 12px;cursor:pointer;}

  .task{display:flex;align-items:flex-start;gap:12px;background:var(--card);border:1px solid var(--line);border-top:3px solid var(--mode-accent);border-radius:12px;padding:14px 16px;margin-bottom:8px;position:relative;}
  .task.done{opacity:.55;}
  .check{width:26px;height:26px;border-radius:7px;border:2px solid var(--ink-soft);flex:0 0 auto;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;position:relative;}
  .check::before{content:"";position:absolute;inset:-9px;} /* unsichtbar vergrößerte Trefferfläche, ~44x44 gesamt, ohne die Optik zu verändern */
  .check.on{background:var(--ink);border-color:var(--ink);}
  .check.on::after{content:"✓";color:var(--paper);font-size:15px;}
  .task-body{flex:1;min-width:0;}
  .task-title-row{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;}
  .task-title{font-size:16px;font-weight:500;line-height:1.35;}
  .del-btn{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:17px;flex:0 0 auto;padding:0;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;}
  .del-btn::before{content:"";position:absolute;inset:-6px;} /* unsichtbar auf ~44x44 vergrößerte Trefferfläche, wie schon bei .check — Optik bleibt kompakt, wichtig in dichten Listen (Ersatzteile, Dokumente) */
  .del-btn:hover{color:var(--rust-text);background:var(--paper-2);}
  .task-meta{font-family:'JetBrains Mono',monospace;font-size:13.5px;color:var(--ink-soft);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  select.assignee,input.firma-input,input.date-input,input.time-input{font-family:'Work Sans',sans-serif;font-size:16px;border:1px solid var(--line);background:var(--paper-2);border-radius:6px;padding:4px 6px;color:var(--ink);max-width:100%;}
  input.firma-input{width:130px;}
  input.date-input{width:150px;}
  input.time-input{width:100px;}
  input.firma-input::placeholder{color:var(--ink-soft);}
  .eco-tip{margin-top:8px;padding:7px 10px;border-radius:8px;background:var(--leaf-bg);color:var(--leaf);font-size:12px;line-height:1.4;display:flex;gap:6px;}
  .why-tip{margin-top:8px;padding:7px 10px;border-radius:8px;background:var(--paper-2);color:var(--ink-soft);font-size:12px;line-height:1.4;display:flex;gap:6px;}
  .why-tip .why-icon{flex:0 0 auto;}
  .eco-tip .leaf{flex:0 0 auto;}

  .details-toggle{background:none;border:none;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.03em;cursor:pointer;padding:0;margin-top:6px;text-decoration:underline;text-underline-offset:2px;}
  .details-panel{margin-top:8px;display:grid;gap:8px;background:var(--paper-2);border-radius:8px;padding:10px;}
  .details-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .details-row label{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);min-width:150px;}
  .details-row input{font-family:'Work Sans',sans-serif;font-size:16px;border:1px solid var(--line);background:var(--card);border-radius:6px;padding:4px 8px;color:var(--ink);flex:1;min-width:100px;}
  .details-row input[type=number]{max-width:90px;flex:0 0 auto;}

  .empty-hint{color:var(--ink-soft);font-size:13px;padding:16px;text-align:center;border:1px dashed var(--line);border-radius:12px;}

  .filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .filter-chip{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.02em;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:9px 14px;min-height:44px;box-sizing:border-box;cursor:pointer;color:var(--ink-soft);}
  .filter-chip.active{background:var(--ink);border-color:var(--ink);color:var(--paper);}
  .task-tag{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--paper-2);border-radius:8px;padding:1px 6px;color:var(--ink-soft);}
  .weekday-badge{font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--ink);color:var(--paper);border-radius:6px;padding:3px 7px;}
  .weekday-row{display:flex;gap:5px;flex-wrap:wrap;}
  .weekday-chip{font-family:'JetBrains Mono',monospace;font-size:13px;min-width:44px;min-height:44px;border-radius:8px;border:1px solid var(--line);background:var(--paper-2);color:var(--ink-soft);cursor:pointer;padding:0;}
  .wd-summary{display:flex;align-items:center;gap:6px;}
  .wd-summary-badge{font-size:14px;color:var(--ink-soft);}
  .wd-edit-btn{min-width:44px;min-height:44px;border-radius:10px;border:1px solid var(--line);background:var(--paper-2);color:var(--ink-soft);font-size:16px;cursor:pointer;}
  .weekday-chip.active{background:var(--ink);border-color:var(--ink);color:var(--paper);}
  .person-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;display:inline-block;}

  .add-task-btn{width:100%;font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.03em;background:none;border:1px dashed var(--line);border-radius:12px;padding:13px;min-height:44px;color:var(--ink-soft);cursor:pointer;margin-top:4px;}
  .add-task-btn:hover{color:var(--ink);border-color:var(--ink-soft);}
  .catalog-details{margin-top:4px;}
  .catalog-details summary{list-style:none;cursor:pointer;width:100%;font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.03em;background:none;border:1px dashed var(--line);border-radius:12px;padding:13px;min-height:44px;color:var(--ink-soft);text-align:center;box-sizing:border-box;}
  .catalog-details summary::-webkit-details-marker{display:none;}
  .catalog-details summary::before{content:"▸ ";}
  .catalog-details[open] summary::before{content:"▾ ";}
  .catalog-details[open] summary{border-radius:12px 12px 0 0;border-bottom:none;}
  .add-task-form{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-top:4px;display:grid;gap:8px;}
  .catalog-details[open] > .add-task-form{border-radius:0 0 12px 12px;margin-top:0;max-height:340px;overflow-y:auto;}
  .template-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  @media (max-width:420px){.template-grid{grid-template-columns:repeat(2,1fr);}}
  .template-tile{position:relative;display:flex;flex-direction:column;align-items:center;gap:5px;border:1px solid var(--line);background:var(--paper);border-radius:12px;padding:12px 8px;cursor:pointer;font-family:'Work Sans',sans-serif;color:var(--ink);min-height:44px;}
  .template-tile.active{border-color:var(--leaf);background:var(--leaf-bg);}
  .template-icon{font-size:30px;line-height:1;}
  .template-label{font-size:13px;text-align:center;line-height:1.3;}
  .template-badge{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:var(--leaf);color:var(--paper);font-size:11px;display:flex;align-items:center;justify-content:center;}
  .add-task-form input[type=text]{font-family:'Work Sans',sans-serif;font-size:16px;border:1px solid var(--line);border-radius:8px;padding:10px 12px;min-height:44px;outline:none;background:var(--paper);color:var(--ink);box-sizing:border-box;}
  .add-task-form select{font-family:'Work Sans',sans-serif;font-size:16px;border:1px solid var(--line);border-radius:8px;padding:10px 8px;min-height:44px;outline:none;background:var(--paper);color:var(--ink);}
  .add-task-form .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .add-task-form label.chk{font-family:'JetBrains Mono',monospace;font-size:13.5px;color:var(--ink-soft);display:flex;align-items:center;gap:5px;min-height:44px;}
  .add-task-form .actions{display:flex;gap:8px;justify-content:flex-end;}
  .add-task-form button{font-family:'JetBrains Mono',monospace;font-size:14px;border-radius:8px;padding:11px 18px;min-height:44px;cursor:pointer;}
  .btn-save{background:var(--ink);color:var(--paper);border:1px solid var(--ink);}
  .btn-cancel{background:none;color:var(--ink-soft);border:1px solid var(--line);}

<script>
/* ============================================================================
   SUPABASE CLOUD-SYNC — HIER EURE EIGENEN ZUGANGSDATEN EINTRAGEN
   1. Projekt auf https://supabase.com anlegen (kostenlos)
   2. Das mitgelieferte homesync-schema.sql im SQL-Editor ausführen
   3. Settings → API → "Project URL" und "anon public" Key hier eintragen

   Bewusst simples Modell (wie bei Pack & Shop): EIN Code = EINE Zeile in der
   Datenbank mit dem kompletten App-Zustand als ein Datenpaket. Kein Login,
   keine Konten. Der Code selbst ist das "Passwort" — wer ihn kennt, sieht die
   Daten. Für eine Test-/Familienphase ausreichend und robust; für einen
   späteren öffentlichen Launch mit fremden Nutzern wäre echtes Login+RLS
   nötig (siehe Chat-Hinweis dazu).
   ============================================================================ */
const SUPABASE_URL = 'https://bvhcdhbqpzgkmsdzxctg.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_EjJd-Yo9unTkxdXtVD_Fiw_fp3y2w_5';

const supa = (SUPABASE_URL.includes('DEIN-PROJEKT'))
  ? null
  : window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const SB_TABLE = 'households';

// Stabile, anonyme Geräte-ID nur fürs serverseitige Rate-Limiting in den
// RPC-Funktionen (get_household/upsert_household) — kein Tracking, keine PII,
// nie an eine Person gebunden.
function getDeviceKey(){
  try{
    let k = localStorage.getItem('homesync-device-key');
    if(!k){ k = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random()); localStorage.setItem('homesync-device-key', k); }
    return k;
  }catch(e){ return 'unknown'; }
}
const LOCAL_CONTENT_KEY = 'homesync-content';
const LOCAL_CODE_KEY = 'homesync-household-code';

let cloudMode = false;     // false = lokal auf dem Gerät, true = mit einem Code verbunden
let householdCode = null;  // der aktuelle Beitritts-/Haushalts-Code
let syncTs = 0;            // Zeitstempel des zuletzt übernommenen Datenstands
let lastWriteTs = 0;       // Zeitstempel des letzten EIGENEN Schreibvorgangs (um Echo zu vermeiden)
let rtChannel = null;
let pollTimer = null;

function setSyncStatus(text){
  const el = document.getElementById('syncStatus');
  if(el) el.textContent = text;

}

// Grüner Punkt am 👥-Button, solange dieses Gerät mit einem Cloud-Code
// verbunden ist (unabhängig vom aktuellen Sync-Status-Text).
function updateConnectedIndicator(){
  const btn = document.getElementById('profileBtn');
  if(btn) btn.classList.toggle('is-connected', !!cloudMode);
}

async function initSupabaseAuth(){
  wireCloudSyncButtons();
  // Prüfen, ob dieses Gerät sich schon früher mit einem Code verbunden hatte.
  try{ householdCode = localStorage.getItem(LOCAL_CODE_KEY); }catch(e){}

  if(householdCode && supa){
    cloudMode = true;
    setSyncStatus('🔄 Verbinde …');
    try{
      await loadAll();
      startPolling();
      setSyncStatus('☁️ ' + t().cloudSynced);
    }catch(e){
      console.warn('Cloud-Laden fehlgeschlagen, bleibe lokal', e);
      cloudMode = false;
      await loadAll();
    }
  } else {
    cloudMode = false;
    await loadAll();
  }
  updateConnectedIndicator();
  render();
}

function contentObj(){
  return { state, houseInfo, people, vehicles, inventory, documents, bookings, customTasks, activatedCatalog, deactivatedCatalog, removedIds, taskOrder };
}
function applyContent(c){
  if(!c) return;
  state = c.state || {};
  if(c.houseInfo) houseInfo = c.houseInfo;
  if(c.people) people = c.people;
  if(c.vehicles) vehicles = c.vehicles;
  if(c.inventory) inventory = c.inventory;
  if(c.documents) documents = c.documents;
  bookings = c.bookings || [];
  if(c.customTasks) customTasks = c.customTasks;
  if(c.activatedCatalog) activatedCatalog = c.activatedCatalog;
  if(c.deactivatedCatalog) deactivatedCatalog = c.deactivatedCatalog;
  if(c.removedIds) removedIds = c.removedIds;
  if(c.taskOrder) taskOrder = c.taskOrder;
}

// Führt einen frisch aus der Cloud geladenen Stand (remote) mit dem lokalen
// Stand (local) zusammen, statt ihn einfach zu überschreiben. So gehen
// Änderungen, die kurz zuvor von einem anderen Gerät gespeichert wurden
// (und noch nicht per Realtime/Polling hier angekommen sind), nicht mehr
// verloren, wenn dieses Gerät jetzt selbst speichert.
function mergeIdArrayUnion(remoteArr, localArr){
  const out = Array.isArray(remoteArr) ? remoteArr.slice() : [];
  (Array.isArray(localArr) ? localArr : []).forEach(id=>{ if(!out.includes(id)) out.push(id); });
  return out;
}
function mergeObjArrayById(remoteArr, localArr){
  const map = new Map();
  (Array.isArray(remoteArr) ? remoteArr : []).forEach(x=>{ if(x && x.id!=null) map.set(x.id, x); });
  (Array.isArray(localArr) ? localArr : []).forEach(x=>{ if(x && x.id!=null) map.set(x.id, x); }); // lokal gewinnt bei Konflikt gleicher ID
  return Array.from(map.values());
}
function mergeContent(remote, local){
  if(!remote) return local;
  const merged = { ...local };

  // state: pro Aufgabe zusammenführen (lokale Werte gewinnen bei gleicher ID)
  merged.state = { ...(remote.state||{}), ...(local.state||{}) };

  // Vorlagen-Auswahl: pro Bereich vereinigen statt überschreiben — das
  // verhindert, dass gleichzeitig auf zwei Geräten aktivierte Vorlagen
  // wieder verschwinden. ABER: eine reine Union kann nie schrumpfen — jede
  // Abwahl würde beim nächsten Merge aus der (noch nicht aktualisierten)
  // Remote-Kopie wieder reinkommen. Deshalb zusätzlich deactivatedCatalog
  // als Tombstone-Liste mergen und von der aktivierten Menge abziehen.
  const catKeys = new Set([
    ...Object.keys(remote.activatedCatalog||{}), ...Object.keys(local.activatedCatalog||{}),
    ...Object.keys(remote.deactivatedCatalog||{}), ...Object.keys(local.deactivatedCatalog||{}),
  ]);
  merged.activatedCatalog = {};
  merged.deactivatedCatalog = {};
  catKeys.forEach(k=>{
    const activeUnion = mergeIdArrayUnion((remote.activatedCatalog||{})[k], (local.activatedCatalog||{})[k]);
    const deactivatedUnion = mergeIdArrayUnion((remote.deactivatedCatalog||{})[k], (local.deactivatedCatalog||{})[k]);
    merged.activatedCatalog[k] = activeUnion.filter(id => !deactivatedUnion.includes(id));
    merged.deactivatedCatalog[k] = deactivatedUnion;
  });

  // Tombstones zuerst zusammenführen (einfache Vereinigung reicht hier —
  // einmal gelöscht bleibt gelöscht, bis jemand es aktiv neu anlegt, was
  // dann automatisch eine neue ID bekommt).
  const removedNs = new Set([...Object.keys(remote.removedIds||{}), ...Object.keys(local.removedIds||{})]);
  merged.removedIds = {};
  removedNs.forEach(ns=>{
    merged.removedIds[ns] = mergeIdArrayUnion((remote.removedIds||{})[ns], (local.removedIds||{})[ns]);
  });
  const removed = (ns) => merged.removedIds[ns] || [];

  // Listen mit IDs: nach ID zusammenführen statt zu ersetzen, danach
  // gelöschte IDs per Tombstone rausfiltern (siehe removedIds oben).
  merged.people = mergeObjArrayById(remote.people, local.people).filter(x=>x && !removed('people').includes(x.id));
  merged.vehicles = mergeObjArrayById(remote.vehicles, local.vehicles).filter(x=>x && !removed('vehicles').includes(x.id));
  merged.inventory = mergeObjArrayById(remote.inventory, local.inventory).filter(x=>x && !removed('inventory').includes(x.id));
  merged.documents = mergeObjArrayById(remote.documents, local.documents).filter(x=>x && !removed('documents').includes(x.id));
  merged.bookings = mergeObjArrayById(remote.bookings, local.bookings).filter(x=>x && !removed('bookings').includes(x.id));

  // customTasks hat eine uneinheitliche Form: "jahr" ist ein verschachteltes
  // Objekt mit vier Jahreszeiten-Arrays, "quartal"/"monat"/"woche" sind
  // direkt Arrays. Beides muss unterschiedlich zusammengeführt werden.
  const remoteCT = remote.customTasks || {};
  const localCT = local.customTasks || {};
  merged.customTasks = { ...remoteCT };
  const ctKeys = new Set([...Object.keys(remoteCT), ...Object.keys(localCT)]);
  ctKeys.forEach(k=>{
    if(k === 'jahr'){
      const remoteJahr = remoteCT.jahr || {};
      const localJahr = localCT.jahr || {};
      const mergedJahr = { ...remoteJahr };
      const seasonKeys = new Set([...Object.keys(remoteJahr), ...Object.keys(localJahr)]);
      seasonKeys.forEach(season=>{
        mergedJahr[season] = mergeObjArrayById(remoteJahr[season], localJahr[season])
          .filter(x=>x && !removed('customTasks:jahr:'+season).includes(x.id));
      });
      merged.customTasks.jahr = mergedJahr;
    } else {
      merged.customTasks[k] = mergeObjArrayById(remoteCT[k], localCT[k])
        .filter(x=>x && !removed('customTasks:'+k).includes(x.id));
    }
  });

  // Haus-Profil & Reihenfolge: seltener Konflikt, lokal gewinnt
  merged.houseInfo = local.houseInfo || remote.houseInfo;
  merged.taskOrder = local.taskOrder || remote.taskOrder;

  return merged;
}

// Ein Aufruf für ALLES: egal was sich geändert hat (Aufgabe, Person, Buchung,
// Haus-Profil, Katalog, Reihenfolge) — der komplette Zustand wird als EIN
// Datenpaket gespeichert. Lokal als ein localStorage-Eintrag, verbunden als
// eine Zeile in Supabase (upsert auf den aktuellen Code).
// Bewusst offline-first: der lokale Schnappschuss wird IMMER geschrieben,
// auch im Cloud-Modus — vorher passierte das nur im rein-lokalen Zweig, d.h.
// ein fehlgeschlagener Cloud-Schreibvorgang (offline, Server-Fehler, o.ä.)
// hätte die Änderung nirgends persistiert; sie hätte nur im JS-Speicher
// gelebt und wäre bei einem Reload/Tab-Schließen verloren gegangen, obwohl
// ein Kommentar hier das Gegenteil behauptete. Jetzt: lokal schreiben zuerst
// (kann nicht an einem Netzwerkfehler scheitern), Cloud-Schreiben danach.
async function saveContent(){
  let o = contentObj();
  o._ts = Date.now();
  lastWriteTs = o._ts; syncTs = o._ts;

  try{ localStorage.setItem(LOCAL_CONTENT_KEY, JSON.stringify(o)); }
  catch(e){ console.warn('saveContent (local backup):', e); }

  if(!(cloudMode && supa && householdCode)){
    return; // reiner Lokal-Modus: fertig, lokale Kopie ist die Wahrheit
  }

  try{
    // Kurz vor dem Schreiben nochmal den frischesten Cloud-Stand holen und
    // zusammenführen, damit ein zwischenzeitliches Update eines anderen
    // Geräts nicht überschrieben wird.
    const freshRemote = await fetchShared(householdCode);
    o = mergeContent(freshRemote, o);
    applyContent(o); // damit die UI hier sofort den zusammengeführten Stand zeigt
    o._ts = Date.now();
    lastWriteTs = o._ts; syncTs = o._ts;
    try{ localStorage.setItem(LOCAL_CONTENT_KEY, JSON.stringify(o)); }catch(e){}

    const { error } = await supa.rpc('upsert_household', { p_code: householdCode, p_content: o, p_client_key: getDeviceKey() });
    if(error){
      console.warn('saveContent (cloud):', JSON.stringify(error));
      pendingCloudSync = true;
      setSyncStatus('⚠️ ' + safeSyncErrorMessage(error));
    } else {
      pendingCloudSync = false;
      setSyncStatus('☁️ ' + t().cloudSynced);
    }
  }catch(e){
    console.warn('saveContent:', e);
    pendingCloudSync = true;
    setSyncStatus('⚠️ ' + safeSyncErrorMessage(e));
  }
}

// Fehlermeldungen aus Supabase/Postgres können interne Details enthalten
// (Tabellennamen, Constraint-Namen, teils SQL-Fragmente). Die zeigen wir
// nicht 1:1 in der UI — nur eine kleine Allowlist bekannter, harmloser
// Fälle bekommt einen konkreten Text, alles andere einen generischen.
function safeSyncErrorMessage(err){
  const raw = (err && (err.message || err.error_description || err.details)) ? String(err.message || err.error_description || err.details) : '';
  if(/too_many_attempts/i.test(raw)) return t().cloudRateLimited || 'Zu viele Versuche — bitte kurz warten.';
  if(/invalid_code_format/i.test(raw)) return t().cloudBadCode || 'Ungültiges Code-Format.';
  if(!navigator.onLine) return t().cloudOffline || 'Offline — wird synchronisiert, sobald wieder online.';
  return t().cloudSyncErr;
}

async function fetchShared(code){
  if(!supa || !code) return null;
  try{
    const { data, error } = await supa.rpc('get_household', { p_code: code, p_client_key: getDeviceKey() });
    if(error){ console.warn('fetchShared:', JSON.stringify(error)); return null; }
    return data || null;
  }catch(e){ console.warn('fetchShared:', e); return null; }
}

async function loadAll(){
  if(cloudMode && supa && householdCode){
    const c = await fetchShared(householdCode);
    if(c){ syncTs = c._ts || 0; applyContent(c); }
    // kein Inhalt unter dem Code -> bleibt beim aktuellen (evtl. leeren) Stand,
    // wird beim nächsten saveContent() als neuer Code angelegt.
  } else {
    try{
      const raw = localStorage.getItem(LOCAL_CONTENT_KEY);
      if(raw) applyContent(JSON.parse(raw));
    }catch(e){}
  }
  if(!people || !people.length){ people = DEFAULT_PEOPLE[lang].map(name => ({id: uid(), name})); }
  if(!vehicles || !vehicles.length){ vehicles = [{id: uid(), name: t().tabs.auto, icon:'🚗'}]; }
}

// Gemeinsame Speicherfunktion für ALLE Änderungen — ersetzt die früheren
// einzelnen save*()-Funktionen, weil jetzt alles EIN Datenpaket ist.
async function saveState(){ return saveContent(); }
async function saveHouse(){ return saveContent(); }
async function savePeople(){ return saveContent(); }
async function saveVehicles(){ return saveContent(); }
async function saveInventory(){ return saveContent(); }
async function saveDocuments(){ return saveContent(); }
async function saveBookings(){ return saveContent(); }
async function saveCustomTasks(){ return saveContent(); }
async function saveActivatedCatalog(){ return saveContent(); }
async function saveTaskOrder(){ return saveContent(); }
async function saveLang(){ try{ localStorage.setItem('homesync-lang', lang); }catch(e){} } // bleibt bewusst lokal/persönlich

function makeCode(){
  const A = 'ABCDEFGHJKLMNPQRSTUVWXYZ', N = '23456789';
  const pick = (s,n) => Array.from({length:n}, ()=>s[Math.floor(Math.random()*s.length)]).join('');
  return pick(A,4) + '-' + pick(N,3);
}

// Verbinden deckt beides ab: neuer Code -> aktuelle lokale Daten werden dort
// angelegt; bestehender Code -> dessen Daten werden übernommen (ersetzt die
// lokalen Daten auf diesem Gerät).
// Muss zum Constraint "households_id_format" in der DB passen
// (^[A-Z]{4}-[0-9]{3}$), damit falsche Codes sofort und ohne Server-Roundtrip
// eine verständliche Meldung bekommen statt einer rohen Postgres-Fehlermeldung.
const CODE_FORMAT = /^[A-Z]{4}-[0-9]{3}$/;

async function connectHousehold(code){
  code = (code || '').trim().toUpperCase();
  if(!code || !supa) return;
  const statusEl = document.getElementById('cloudSyncStatus');
  if(!CODE_FORMAT.test(code)){
    if(statusEl) statusEl.textContent = t().cloudBadCode || 'Ungültiges Code-Format (Beispiel: ABCD-123).';
    return;
  }
  if(statusEl) statusEl.textContent = t().cloudConnecting;
  householdCode = code;
  cloudMode = true;
  try{ localStorage.setItem(LOCAL_CODE_KEY, code); }catch(e){}
  const c = await fetchShared(code);
  if(c){ syncTs = c._ts || 0; applyContent(c); }
  else { await saveContent(); } // neuer Code -> aktuellen Stand hochladen
  startPolling();
  updateConnectedIndicator();
  render();
  renderCloudModalContent();
  setSyncStatus('☁️ ' + t().cloudSynced);
}

async function disconnectHousehold(){
  householdCode = null;
  cloudMode = false;
  try{ localStorage.removeItem(LOCAL_CODE_KEY); }catch(e){}
  stopPolling();
  await saveContent(); // sichert den aktuellen Stand lokal auf diesem Gerät
  updateConnectedIndicator();
  render();
  setSyncStatus('');
}

function wireCloudSyncButtons(){
  document.getElementById('profileBtn').addEventListener('click', openCloudModal);
  document.getElementById('cloudModalClose').addEventListener('click', closeCloudModal);
  document.getElementById('cloudModal').addEventListener('click', (e)=>{
    if(e.target.id === 'cloudModal') closeCloudModal();
  });

  document.body.addEventListener('click', async (e)=>{
    if(e.target.id === 'cloudCreateBtn'){
      await connectHousehold(makeCode());
    } else if(e.target.id === 'cloudJoinShowBtn'){
      const row = document.getElementById('cloudJoinRow');
      if(row) row.style.display = row.style.display === 'none' ? 'block' : 'none';
    } else if(e.target.id === 'cloudJoinBtn'){
      const codeInput = document.getElementById('cloudJoinCode');
      if(codeInput && codeInput.value.trim()) await connectHousehold(codeInput.value.trim());
    }
  });
}

function openCloudModal(){
  renderCloudModalContent();
  document.getElementById('cloudModal').style.display = 'flex';
  document.body.classList.add('modal-open');
}
function closeCloudModal(){
  document.getElementById('cloudModal').style.display = 'none';
  document.body.classList.remove('modal-open');
}

// Wendet einen von außen (Realtime/Polling) hereingekommenen Stand an —
// nur, wenn er neuer ist als der eigene und nicht das eigene Echo ist.
// Erkennt, ob gerade aktiv getippt/editiert wird (offenes Formular oder
// Fokus in einem Eingabefeld). Läuft in dem Moment ein Sync-Update rein
// (z. B. weil ein anderes Familienmitglied gerade etwas gespeichert hat),
// wollen wir NICHT die ganze Ansicht neu aufbauen — sonst schließt sich das
// gerade offene Formular mitten beim Tippen, und die Eingabe geht verloren.
function isUserEditing(){
  const ae = document.activeElement;
  if(ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA')) return true;
  if(addFormOpenFor) return true;
  if(bookingFormOpen) return true;
  return false;
}
let pendingRemoteRender = false;

function applyRemote(c){
  if(!c || !c._ts) return false;
  if(c._ts > syncTs && c._ts !== lastWriteTs){
    syncTs = c._ts;
    applyContent(c); // Daten werden trotzdem sofort übernommen …
    if(isUserEditing()){
      // … aber der sichtbare Rebuild wird verschoben, bis das Formular zu
      // ist bzw. das Feld den Fokus verliert. Der nächste render()-Aufruf
      // (z. B. beim Abschicken/Abbrechen des Formulars) zeigt dann ohnehin
      // schon den zusammengeführten Stand.
      pendingRemoteRender = true;
    } else {
      render();
    }
    return true;
  }
  return false;
}

// Sobald ein Formular geschlossen wird oder ein Feld den Fokus verliert,
// einen aufgeschobenen Render nachholen, falls einer aussteht.
document.addEventListener('focusout', (e)=>{
  if(!pendingRemoteRender) return;
  if(e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')){
    setTimeout(()=>{
      if(pendingRemoteRender && !isUserEditing()){ pendingRemoteRender = false; render(); }
    }, 150); // kurze Verzögerung, falls der Fokus nur zwischen zwei Feldern desselben Formulars wechselt
  }
}, true);

// Hinweis: Es gibt bewusst KEIN supabase.channel('postgres_changes') mehr.
// Nach dem Security-Hardening (Tabellenzugriff für "anon" gesperrt, nur noch
// über RPCs erreichbar) liefert Realtime auf die Tabelle selbst keine Events
// mehr aus. Polling übernimmt das komplett — für eine Familien-App reicht
// alle 15s völlig.
function startPolling(){
  stopPolling();
  if(!householdCode) return;
  pollTimer = setInterval(async ()=>{
    if(!householdCode || !navigator.onLine) return;
    const c = await fetchShared(householdCode);
    applyRemote(c);
  }, 15000);
}
function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer = null; } }

// Offline/Online: bei Verbindungsverlust nur informieren (lokale Änderungen
// bleiben ganz normal im Speicher/localStorage erhalten); sobald die
// Verbindung zurück ist, sofort nachholen statt auf die nächste manuelle
// Änderung oder das nächste Poll-Intervall zu warten.
let pendingCloudSync = false;
window.addEventListener('offline', ()=>{
  if(cloudMode) setSyncStatus('📴 ' + (t().cloudOffline || 'Offline'));
});
window.addEventListener('online', async ()=>{
  if(cloudMode && householdCode){
    setSyncStatus('🔄 Verbinde …');
    try{ await saveContent(); }catch(e){ console.warn('online-resync:', e); }
  }
  pendingCloudSync = false;
});

  'j-fr-5':{t:'Visually inspect façade for cracks, damp & plaster damage',why:'Undetected cracks let water into the masonry and can cause frost damage and mould.'},
  'j-so-1':{t:'Have the hot water & heating system serviced by a professional',why:'Regular servicing noticeably lowers energy use and prevents a breakdown in the middle of winter.'},
  'j-so-2':{t:'Deep-clean the grill',eco:'Apply a baking-soda paste instead of grill spray.'},
  'j-so-3':{t:'Optimise irrigation'},
  'j-so-4':{t:'Have electrical systems & fuse box checked',why:'Outdated or damaged wiring is one of the most common causes of house fires.'},
  'j-he-1':{t:'Bleed all radiators',why:'Trapped air stops radiators from getting properly warm and needlessly increases energy use.'},
  'j-he-2':{t:'Drain outdoor pipes & outside taps (frost protection)',why:'Freezing water left in the pipes can burst them — a classic and costly winter mistake.'},
  'j-he-3':{t:'Rake leaves, empty rain barrels before frost'},
  'j-he-4':{t:'Bring sensitive plants indoors'},
  'j-he-5':{t:'Inspect roof & gutters for damage and blockages',why:'Blocked gutters stop rainwater draining away; it finds its way into the façade and masonry instead.'},
  'j-he-6':{t:'Check backflow valves/lifting stations for function',why:'In heavy rain, sewage can otherwise be pushed back through the drains into the basement.'},
  'j-he-7':{t:'Oil window & door fittings, check seals',why:'Dry fittings wear out faster, and worn seals let heat and moisture through.'},
  'j-wi-1':{t:'Thoroughly clear out the basement/attic',why:'Clutter makes it harder to spot genuine damp or pest damage early.'},
  'j-wi-2':{t:'Test smoke detectors & check batteries',why:"A flat battery only becomes obvious in an emergency — by then it's too late."},
  'j-wi-3':{t:'Check chimney sweep inspection date (for fireplace/stove)',why:'Legally required; undetected faults in the heating appliance are a common cause of fires.'},
  'q-1':{t:'Clean windows',eco:'Vinegar-water (1:1) instead of glass cleaner.'},
  'q-2':{t:'Flip mattresses'}, 'q-3':{t:'Defrost the freezer compartment'},
  'q-4':{t:'Deep-clean the car (interior & car wash)'},
  'q-5':{t:'Rinse or replace the drinking water filter',why:'An old filter becomes a source of germs itself instead of making the water cleaner.'},
  'm-1':{t:'Run washing machine empty with cleaner',eco:'Citric acid (2–3 tbsp per litre) instead of descaler tabs.'},
  'm-2':{t:'Run dishwasher empty with cleaner',eco:'Citric acid instead of chemical descaler.'},
  'm-3':{t:'Clean the extractor hood filter',eco:'Hot water with soda or soft soap instead of degreaser spray.'},
  'm-4':{t:'Clean bathroom ventilation filter'}, 'm-5':{t:'Sort the pantry, check use-by dates'},
  'm-6':{t:'Preventively clean the drain',eco:'Sprinkle baking soda, add vinegar, let it fizz briefly, rinse with hot water.'},
  'm-7':{t:'Read the electricity meter and check consumption',why:'Reading it regularly catches a creeping rise in usage before the annual bill surprises you.'},
  'w-1':{t:'Vacuum'}, 'w-2':{t:'Do laundry'},
  'w-3':{t:'Clean the bathroom',eco:'Baking soda + vinegar instead of chemical cleaners; descale fixtures with citric acid.'},
  'w-4':{t:'Take out the trash'},
  'j-fr-6':{t:'Inspect the roof for winter damage (tiles, cracks, moss)',why:'Loose tiles or small damage quickly turn into costly water ingress in the roof structure once it rains.'},
  'j-fr-7':{t:'Clean the solar panels and check for damage',why:"Dirty panels lose noticeable output, and undetected damage shortens the system's lifespan."},
  'j-so-5':{t:'Ventilate the garage, check for oil stains and damp'},
  'j-so-6':{t:'Compare solar yield with last year',why:'A sudden drop in yield is often the earliest sign of a technical fault.'},
  'j-he-8':{t:'Have garage door springs, opener and sensors checked'},
  'j-wi-4':{t:'Test CO detectors',why:"Carbon monoxide is odourless and often goes unnoticed by those affected until it's dangerous."},
  'j-wi-5':{t:'During heavy snow: keep an eye on the roof load',why:"Too much snow load can overwhelm a roof's structure, especially on older constructions."},
  'q-6':{t:'Check fire extinguisher and first-aid kit expiry dates',why:'An expired extinguisher often no longer has enough pressure to work in an emergency.'},
  'm-8':{t:'Solar: check yield on the inverter or in the app',why:'An inverter fault can otherwise go unnoticed for months and costs real money.'},
  'w-5':{t:'Water the plants'},
},
sv:{
  'u-1':{t:'Överlämningsprotokoll signerat med mätarställningar (el, vatten, gas)'},
  'u-2':{t:'Brister vid överlämning fotograferade och noterade i protokollet'},
  'u-3':{t:'Energideklaration mottagen (obligatoriskt dokument)'},
  'u-4':{t:'Bygglov, ritningar & konstruktionshandlingar mottagna'},
  'u-5':{t:'Garantihandlingar & garantibevis insamlade'},
  'u-6':{t:'Serviceavtal (värme m.m.) övertagna eller nytecknade'},
  'u-7':{t:'Nyckelöversikt upprättad (ytterdörr, uthus, brevlåda)'},
  'u-8':{t:'Garantitiden antecknad i kalendern'},
  'u-9':{t:'Besiktning inbokad strax före garantitidens slut för att upptäcka sena fel'},
  'j-fr-1':{t:'Förbereda rabatter'},
  'j-fr-2':{t:'Rengöra terrassen',eco:'Vid känsligt underlag: såplösning + borste istället för högtryckstvätt.'},
  'j-fr-3':{t:'Ta fram utemöbler efter vintern'},
  'j-fr-4':{t:'Rengöra fönster inkl. karmar & persienner från vintersmuts',eco:'Ättiksvatten (1:1) istället för fönsterputs, torka med tidningspapper.',why:'Smutsiga karmar och tätningar släpper in fukt och förkortar fönstrens livslängd.'},
  'j-fr-5':{t:'Okulärbesiktiga fasaden för sprickor, fukt & putsskador',why:'Oupptäckta sprickor släpper in vatten i muren och kan orsaka frostskador och mögel.'},
  'j-so-1':{t:'Låt fackman kontrollera värme- och varmvattensystemet',why:'Regelbunden service sänker energiförbrukningen märkbart och förhindrar driftstopp mitt i vintern.'},
  'j-so-2':{t:'Djuprengöra grillen',eco:'Bikarbonatpasta istället för grillspray.'},
  'j-so-3':{t:'Optimera bevattningen'},
  'j-so-4':{t:'Låt kontrollera elanläggning & elcentral',why:'Föråldrad eller skadad elinstallation är en av de vanligaste orsakerna till husbränder.'},
  'j-he-1':{t:'Lufta alla element',why:'Luft i systemet hindrar elementen från att bli ordentligt varma och ökar energiförbrukningen i onödan.'},
  'j-he-2':{t:'Tömma utomhusledningar & utekranar (frostskydd)',why:'Vatten som fryser i ledningarna kan spränga rören — ett klassiskt och dyrt vinterfel.'},
  'j-he-3':{t:'Kratta löv, tömma regnvattentunnor före frost'},
  'j-he-4':{t:'Ta in känsliga växter'},
  'j-he-5':{t:'Kontrollera tak & hängrännor för skador och stopp',why:'Tilltäppta hängrännor släpper inte igenom regnvatten; det tar sig då in i fasad och murverk istället.'},
  'j-he-6':{t:'Kontrollera backventiler/pumpstationer',why:'Vid skyfall kan avloppsvatten annars tryckas tillbaka genom ledningarna in i källaren.'},
  'j-he-7':{t:'Olja fönster- och dörrbeslag, kontrollera tätningar',why:'Torra beslag slits fortare, och skadade tätningar släpper igenom värme och fukt.'},
  'j-wi-1':{t:'Grundligt röja källare/vind',why:'Skräp gör det svårare att upptäcka riktiga fukt- eller skadedjursskador i tid.'},
  'j-wi-2':{t:'Testa brandvarnare & kontrollera batterier',why:'Ett tomt batteri märks först i en nödsituation — då är det för sent.'},
  'j-wi-3':{t:'Kontrollera sotningsdatum (vid eldstad/kamin)',why:'Lagstadgat; oupptäckta fel på eldstaden är en vanlig brandorsak.'},
  'q-1':{t:'Putsa fönster',eco:'Ättiksvatten (1:1) istället för fönsterputs.'},
  'q-2':{t:'Vända madrasser'}, 'q-3':{t:'Frosta av frysfacket'},
  'q-4':{t:'Djuprengöra bilen (insida & biltvätt)'},
  'q-5':{t:'Spola eller byta dricksvattenfilter',why:'Ett gammalt filter blir själv en källa till bakterier istället för att göra vattnet renare.'},
  'm-1':{t:'Köra tvättmaskinen tom med rengöringsmedel',eco:'Citronsyra (2–3 msk per liter) istället för avkalkningstabletter.'},
  'm-2':{t:'Köra diskmaskinen tom med rengöringsmedel',eco:'Citronsyra istället för kemisk avkalkning.'},
  'm-3':{t:'Rengöra fläktfiltret',eco:'Hett vatten med soda eller såpa istället för fettlösande spray.'},
  'm-4':{t:'Rengöra badrumsventilationens filter'}, 'm-5':{t:'Sortera skafferiet, kontrollera bäst-före-datum'},
  'm-6':{t:'Förebyggande rengöring av avloppet',eco:'Strö bikarbonat, häll på ättika, låt bubbla en stund, skölj med hett vatten.'},
  'm-7':{t:'Läsa av elmätaren och kontrollera förbrukningen',why:'Regelbunden avläsning upptäcker en smygande ökning av förbrukningen innan årsavräkningen överraskar.'},
  'w-1':{t:'Dammsuga'}, 'w-2':{t:'Tvätta kläder'},
  'w-3':{t:'Städa badrummet',eco:'Bikarbonat + ättika istället för kemiska rengöringsmedel, avkalka blandare med citronsyra.'},
  'w-4':{t:'Slänga soporna'},
  'j-fr-6':{t:'Inspektera taket för vinterskador (tegel, sprickor, mossa)',why:'Lösa tegelpannor eller små skador blir snabbt till dyra vatteninträngningar i takstolen vid regn.'},
  'j-fr-7':{t:'Rengöra solpanelerna och kontrollera skador',why:'Smutsiga paneler tappar märkbart i produktion, och oupptäckta skador förkortar anläggningens livslängd.'},
  'j-so-5':{t:'Vädra garaget, kontrollera oljefläckar och fukt'},
  'j-so-6':{t:'Jämföra solelproduktionen med förra året',why:'Ett plötsligt produktionstapp är ofta det tidigaste tecknet på ett tekniskt fel.'},
  'j-he-8':{t:'Låt kontrollera garageportens fjädrar, motor och sensorer'},
  'j-wi-4':{t:'Testa CO-larm',why:'Kolmonoxid är luktfri och märks ofta inte av de drabbade förrän det blir farligt.'},
  'j-wi-5':{t:'Vid snötyngd: håll koll på taklasten',why:'För stor snölast kan överbelasta takets stomme, särskilt i äldre konstruktioner.'},
  'q-6':{t:'Kontrollera utgångsdatum på brandsläckare och första hjälpen-kit',why:'En utgången brandsläckare har ofta inte längre nog tryck för att fungera i en nödsituation.'},
  'm-8':{t:'Solceller: kontrollera produktionen i växelriktaren eller appen',why:'Ett växelriktarfel kan annars gå obemärkt i månader och kostar riktiga pengar.'},
  'w-5':{t:'Vattna växterna'},
},
it:{
  'u-1':{t:'Verbale di consegna firmato con letture dei contatori (luce, acqua, gas)'},
  'u-2':{t:'Difetti alla consegna fotografati e annotati nel verbale'},
  'u-3':{t:'Attestato di prestazione energetica ricevuto (documento obbligatorio)'},
  'u-4':{t:'Permesso di costruire, planimetrie e documenti statici ricevuti'},
  'u-5':{t:'Certificati di garanzia e attestazioni raccolti'},
  'u-6':{t:'Contratti di manutenzione (riscaldamento ecc.) ereditati o stipulati'},
  'u-7':{t:'Elenco chiavi creato (portone, dependance, cassetta postale)'},
  'u-8':{t:'Termine di garanzia annotato in calendario'},
  'u-9':{t:'Sopralluogo pianificato poco prima della scadenza della garanzia, per rilevare vizi tardivi'},
  'j-fr-1':{t:'Preparare le aiuole'},
  'j-fr-2':{t:'Pulire la terrazza',eco:"Su superfici delicate, sapone di Marsiglia + spazzola invece dell'idropulitrice."},
  'j-fr-3':{t:'Rimuovere il mobilio da giardino dal ricovero invernale'},
  'j-fr-4':{t:'Pulire finestre, telai e persiane dallo sporco invernale',eco:"Acqua e aceto (1:1) invece del detergente per vetri, lucidare con carta di giornale.",why:'Telai e guarnizioni sporchi fanno entrare umidità e accorciano la vita delle finestre.'},
  'j-fr-5':{t:"Ispezionare la facciata per crepe, umidità e danni all'intonaco",why:'Crepe non individuate lasciano entrare acqua nella muratura e possono causare danni da gelo e muffa.'},
  'j-so-1':{t:"Far controllare l'impianto di riscaldamento e acqua calda da un tecnico",why:'La manutenzione regolare riduce sensibilmente i consumi e previene un guasto in pieno inverno.'},
  'j-so-2':{t:'Pulizia profonda del barbecue',eco:'Pasta di bicarbonato invece dello spray sgrassante.'},
  'j-so-3':{t:"Ottimizzare l'irrigazione"},
  'j-so-4':{t:"Far controllare l'impianto elettrico e il quadro contatori",why:'Un impianto elettrico vecchio o danneggiato è una delle cause più comuni di incendio domestico.'},
  'j-he-1':{t:'Sfiatare tutti i termosifoni',why:"L'aria nell'impianto impedisce ai termosifoni di scaldarsi bene e aumenta inutilmente i consumi."},
  'j-he-2':{t:'Svuotare tubazioni e rubinetti esterni (protezione dal gelo)',why:"L'acqua che gela nelle tubazioni può romperle — un classico e costoso errore invernale."},
  'j-he-3':{t:"Rastrellare le foglie, svuotare i raccoglitori d'acqua piovana prima del gelo"},
  'j-he-4':{t:'Ritirare le piante delicate'},
  'j-he-5':{t:'Controllare tetto e grondaie per danni e ostruzioni',why:"Le grondaie ostruite non smaltiscono più l'acqua piovana, che si infiltra invece in facciata e muratura."},
  'j-he-6':{t:'Verificare il funzionamento di valvole antiriflusso/stazioni di sollevamento',why:'In caso di forti piogge, senza queste valvole le acque reflue possono essere spinte indietro fino in cantina.'},
  'j-he-7':{t:'Oliare cerniere e maniglie di porte e finestre, controllare le guarnizioni',why:'Le cerniere secche si usurano più in fretta, e le guarnizioni rovinate fanno passare calore e umidità.'},
  'j-wi-1':{t:'Svuotare a fondo cantina/soffitta',why:'Gli oggetti accumulati rendono più difficile individuare per tempo veri danni da umidità o parassiti.'},
  'j-wi-2':{t:'Testare i rilevatori di fumo e controllare le batterie',why:'Una batteria scarica si nota solo in un\u2019emergenza — e a quel punto è troppo tardi.'},
  'j-wi-3':{t:'Verificare la data del prossimo controllo dello spazzacamino (per camino/stufa)',why:'Obbligatoria per legge; difetti non rilevati nella caldaia sono una causa frequente di incendi.'},
  'q-1':{t:'Pulire le finestre',eco:'Acqua e aceto (1:1) invece del detergente per vetri.'},
  'q-2':{t:'Girare i materassi'}, 'q-3':{t:'Sbrinare il congelatore'},
  'q-4':{t:"Pulizia profonda dell'auto (interni e autolavaggio)"},
  'q-5':{t:"Sciacquare o sostituire il filtro dell'acqua potabile",why:'Un filtro vecchio diventa esso stesso fonte di batteri invece di rendere l\u2019acqua più pulita.'},
  'm-1':{t:'Far girare la lavatrice a vuoto con detergente',eco:'Acido citrico (2-3 cucchiai per litro) invece delle pastiglie anticalcare.'},
  'm-2':{t:'Far girare la lavastoviglie a vuoto con detergente',eco:"Acido citrico invece dell'anticalcare chimico."},
  'm-3':{t:'Pulire il filtro della cappa',eco:'Acqua calda con soda o sapone di Marsiglia invece dello sgrassante spray.'},
  'm-4':{t:'Pulire il filtro di ventilazione del bagno'}, 'm-5':{t:'Riordinare la dispensa, controllare le scadenze'},
  'm-6':{t:'Pulizia preventiva dello scarico',eco:'Versare bicarbonato, aggiungere aceto, lasciare agire brevemente, sciacquare con acqua calda.'},
  'm-7':{t:'Leggere il contatore elettrico e controllare i consumi',why:'Leggerlo regolarmente permette di individuare un aumento graduale dei consumi prima della sorpresa in bolletta.'},
  'w-1':{t:'Aspirare'}, 'w-2':{t:'Fare il bucato'},
  'w-3':{t:'Pulire il bagno',eco:'Bicarbonato + aceto invece di detergenti chimici, sciogliere il calcare dai rubinetti con acido citrico.'},
  'w-4':{t:'Portare fuori la spazzatura'},
  'j-fr-6':{t:'Ispezionare il tetto per danni invernali (tegole, crepe, muschio)',why:'Tegole allentate o piccoli danni diventano rapidamente costose infiltrazioni d\u2019acqua nella struttura del tetto quando piove.'},
  'j-fr-7':{t:'Pulire i pannelli solari e controllare eventuali danni',why:'I pannelli sporchi perdono resa in modo evidente, e i danni non rilevati ne riducono la durata.'},
  'j-so-5':{t:"Arieggiare il garage, controllare macchie d'olio e umidità"},
  'j-so-6':{t:"Confrontare la produzione solare con l'anno precedente",why:'Un calo improvviso della produzione è spesso il primo segnale di un guasto tecnico.'},
  'j-he-8':{t:'Far controllare molle, motore e sensori del portone del garage'},
  'j-wi-4':{t:'Testare i rilevatori di monossido di carbonio',why:'Il monossido di carbonio è inodore e spesso chi ne è colpito non se ne accorge finché non diventa pericoloso.'},
  'j-wi-5':{t:'In caso di neve pesante: tenere d\u2019occhio il carico sul tetto',why:'Un carico di neve eccessivo può sovraccaricare la struttura del tetto, specie in costruzioni datate.'},
  'q-6':{t:"Controllare le scadenze dell'estintore e del kit di primo soccorso",why:'Un estintore scaduto spesso non ha più pressione sufficiente per funzionare in un\u2019emergenza.'},
  'm-8':{t:"Solare: controllare la produzione sull'inverter o nell'app",why:'Un guasto all\u2019inverter può altrimenti passare inosservato per mesi e costare denaro reale.'},
  'w-5':{t:'Annaffiare le piante'},
},
fr:{
  'u-1':{t:'Procès-verbal de remise signé avec relevés des compteurs (électricité, eau, gaz)'},
  'u-2':{t:'Défauts constatés à la remise photographiés et consignés dans le procès-verbal'},
  'u-3':{t:'Diagnostic de performance énergétique reçu (document obligatoire)'},
  'u-4':{t:'Permis de construire, plans & documents de structure reçus'},
  'u-5':{t:'Certificats de garantie et attestations rassemblés'},
  'u-6':{t:"Contrats d'entretien (chauffage etc.) repris ou nouvellement conclus"},
  'u-7':{t:"Trousseau de clés recensé (porte d'entrée, dépendances, boîte aux lettres)"},
  'u-8':{t:'Délai de garantie noté dans le calendrier'},
  'u-9':{t:'Visite programmée peu avant la fin de la garantie, pour détecter les vices tardifs'},
  'j-fr-1':{t:'Préparer les parterres'},
  'j-fr-2':{t:'Nettoyer la terrasse',eco:'Sur revêtement fragile, savon de Marseille + brosse plutôt que le nettoyeur haute pression.'},
  'j-fr-3':{t:'Sortir le mobilier de jardin de son hivernage'},
  'j-fr-4':{t:'Nettoyer fenêtres, cadres et volets des salissures hivernales',eco:"Eau vinaigrée (1:1) au lieu d'un nettoyant vitres, essuyer avec du papier journal.",why:"Des cadres et joints sales laissent entrer l'humidité et raccourcissent la durée de vie des fenêtres."},
  'j-fr-5':{t:"Inspecter la façade (fissures, humidité, dégâts d'enduit)",why:"Des fissures non détectées laissent l'eau pénétrer dans la maçonnerie et peuvent causer des dégâts de gel et des moisissures."},
  'j-so-1':{t:"Faire réviser le système de chauffage et d'eau chaude par un professionnel",why:"Un entretien régulier réduit sensiblement la consommation d'énergie et évite une panne en plein hiver."},
  'j-so-2':{t:'Nettoyage en profondeur du barbecue',eco:'Pâte de bicarbonate plutôt que spray dégraissant.'},
  'j-so-3':{t:"Optimiser l'arrosage"},
  'j-so-4':{t:'Faire vérifier les installations électriques et le tableau électrique',why:"Une installation électrique vétuste ou endommagée est l'une des causes les plus fréquentes d'incendie domestique."},
  'j-he-1':{t:'Purger tous les radiateurs',why:"L'air dans le circuit empêche les radiateurs de bien chauffer et augmente inutilement la consommation."},
  'j-he-2':{t:'Vidanger les canalisations et robinets extérieurs (protection au gel)',why:"L'eau qui gèle dans les canalisations peut les faire éclater — une erreur hivernale classique et coûteuse."},
  'j-he-3':{t:"Ramasser les feuilles, vider les récupérateurs d'eau de pluie avant le gel"},
  'j-he-4':{t:'Rentrer les plantes fragiles'},
  'j-he-5':{t:'Contrôler la toiture et les gouttières (dégâts, obstructions)',why:"Des gouttières bouchées ne laissent plus s'écouler l'eau de pluie, qui s'infiltre alors dans la façade et la maçonnerie."},
  'j-he-6':{t:'Vérifier le fonctionnement des clapets anti-retour/stations de relevage',why:"En cas de fortes pluies, les eaux usées peuvent sinon être refoulées jusque dans la cave."},
  'j-he-7':{t:'Huiler les ferrures de fenêtres et portes, vérifier les joints',why:"Des ferrures sèches s'usent plus vite, et des joints abîmés laissent passer la chaleur et l'humidité."},
  'j-wi-1':{t:'Vider et trier soigneusement cave/grenier',why:"L'encombrement rend plus difficile de repérer à temps de vrais dégâts d'humidité ou de nuisibles."},
  'j-wi-2':{t:'Tester les détecteurs de fumée et vérifier les piles',why:"Une pile vide ne se remarque qu'en cas d'urgence — et il est alors trop tard."},
  'j-wi-3':{t:'Vérifier la date du prochain ramonage (cheminée/poêle)',why:"Obligatoire par la loi ; des défauts non détectés sur l'appareil de chauffage sont une cause fréquente d'incendie."},
  'q-1':{t:'Nettoyer les fenêtres',eco:"Eau vinaigrée (1:1) au lieu d'un nettoyant vitres."},
  'q-2':{t:'Retourner les matelas'}, 'q-3':{t:'Dégivrer le congélateur'},
  'q-4':{t:'Nettoyage en profondeur de la voiture (intérieur & station de lavage)'},
  'q-5':{t:"Rincer ou remplacer le filtre à eau potable",why:"Un vieux filtre devient lui-même une source de bactéries au lieu de rendre l'eau plus propre."},
  'm-1':{t:'Faire tourner le lave-linge à vide avec un produit nettoyant',eco:'Acide citrique (2-3 c. à soupe par litre) au lieu de sachets détartrants.'},

const EMOJI_KEYWORDS = [
  ['🚲', ['fahrrad','rad fahr','bike','cykel','bici','vélo','velo','sykkel']],
  ['🚗', ['auto','car ','bil','voiture','macchina']],
  ['🛵', ['vespa','roller','scooter','motorrad']],

  ['🗑️', ['müll','muell','trash','soppor','rifiuti','poubelle','søppel','sopl','recycl']],
  ['🪴', ['pflanz','plant','väx','vax','pianta','innaff','arros','vann blomst']],
  ['🍽️', ['geschirr','dish','disk','vaisselle','piatti','oppvask']],
  ['🍳', ['koch','cook','laga mat','cucin','cuisin','matlag']],
  ['🛒', ['eink','shop','handl','spesa','course']],
  ['🧊', ['gefrier','frost','freez','frys','congel','congél']],
  ['🔥', ['heiz','ofen','oven','forno','four','stek']],
  ['⚡', ['elektro','electric','elé','elektr']],
  ['💧', ['wasser','water','vatten','acqua','eau ','vann']],
  ['🪟', ['fenster','window','fönster','fonster','finestr','fenêtre','fenetre','vindu']],
  ['🚪', ['tür','tor','door','dörr','dorr','porta','porte']],
  ['🌳', ['garten','garden','trädgård','tradgard','giardino','jardin','hage']],
  ['🧰', ['werkzeug','tool','verktyg','attrezz','outil']],
  ['🐶', ['hund','dog','hund gassi','cane','chien']],
  ['🐱', ['katze','cat','katt','gatto','chat']],
];
function guessEmoji(text){
  const low = (text||'').toLowerCase();
  for(const [emoji, words] of EMOJI_KEYWORDS){
    if(words.some(w => low.includes(w))) return emoji;
  }
  return null;
}

// Echte UUIDs, kompatibel mit den uuid-Spalten in Supabase (people, vehicles, bookings, custom_tasks).
function uid(){
  if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c=>{
    const r = Math.random()*16|0, v = c==='x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}
// A task tagged with e.g. gate:'hasSolar' only shows once that toggle is set in the Gebäude-Zwilling.

  return !!houseInfo[item.gate];
}

// Gemeinsame Erledigt-Logik für Listenansicht UND Icon-Kacheln.
// Prüft, ob die Personenliste noch genau die unangetasteten Standard-Platzhalter ("Du"/"Partner:in") ist.
function isDefaultRoster(){
  if(people.length !== 2) return false;
  const defaultNames = DEFAULT_PEOPLE[lang];
  const names = people.map(p=>p.name);
  return defaultNames.every(n => names.includes(n)) && names.every(n => defaultNames.includes(n));
}
// Prüft, ob eine Person irgendwo (Aufgabe oder Buchung) schon zugewiesen wurde.
function isPersonUsedAnywhere(personId){
  for(const key in state){ if(state[key] && state[key].assignee === personId) return true; }
  if(bookings.some(b => b.personId === personId)) return true;
  return false;
}
// Legt eine neue Person an. Ist die Liste noch der unbenutzte Standard-Platzhalter,
// werden "Du"/"Partner:in" automatisch ersetzt statt nur ergänzt.
function addPerson(name){
  const trimmed = (name || '').trim();
  if(!trimmed) return null;
  if(isDefaultRoster() && people.every(p => !isPersonUsedAnywhere(p.id))){
    people = [];
  }
  const newPerson = {id: uid(), name: trimmed};
  people.push(newPerson);
  savePeople();
  return newPerson;
}

function toggleTaskDone(item, st){
  const wasDone = st.done;
  st.lastDoneAt = wasDone ? st.lastDoneAt : new Date().toISOString();
  const isAlltagTask = ALLTAG_BAUTEILE.includes(item.b);
  if(!isAlltagTask && !wasDone && st.intervalDays && Number(st.intervalDays) > 0){
    // Flexible wiederkehrende Aufgabe (nur Haus-Aufgaben mit Datum): statt
    // dauerhaft "erledigt" zu bleiben, rückt das Fälligkeitsdatum automatisch
    // um das gewählte Intervall weiter. Bei Alltag-Aufgaben NICHT anwenden —
    // die haben seit der Wochentag-Umstellung kein sichtbares Datum mehr,
    // sonst wirkt die Checkbox wie hängengeblieben (verschiebt nur ein
    // unsichtbares Datum, statt sichtbar abzuhaken).
    const next = new Date();
    next.setDate(next.getDate() + Number(st.intervalDays));
    st.dueDate = next.toISOString().slice(0,10);
    st.done = false;
  } else {
    st.done = !wasDone;
  }
  state[item.id] = st;
  saveState();
}

// Haptik nur vorhanden, wenn diese Seite als Capacitor-App gepackt wurde; im Browser stiller No-Op.
function hapticTapIfAvailable(){
  try{
    const H = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Haptics;
    if(H && H.impact) H.impact({ style: 'LIGHT' });
  }catch(e){}
}

function currentSeasonKey(){
  const m = new Date().getMonth();
  return SEASON_KEYS.find(k => SEASON_MONTHS[k].includes(m));
}
function daysAgo(iso){
  if(!iso) return null;
  return Math.floor((Date.now() - new Date(iso).getTime())/86400000);
}
function fmt(tpl, vals){ return tpl.replace(/\{(\w+)\}/g, (_,k)=> vals[k]); }

const MODE_TABS = {alltag:['b-haushalt','b-garten','b-garage','auto','kalender'], haus:['haus','inventar','dokumente','monat','quartal','jahr']};
function renderModeSwitch(){
  document.body.className = viewMode === 'haus' ? 'mode-haus' : 'mode-alltag';
  const el = document.getElementById('modeSwitch');
  el.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'mode-switch';
  [['alltag', '🏠 ' + t().modeAlltag], ['haus', '🔧 ' + t().modeHaus]].forEach(([key,label])=>{
    const b = document.createElement('button');
    b.className = 'mode-btn' + (viewMode===key ? ' active':'');
    b.textContent = label;
    b.addEventListener('click', ()=>{
      if(viewMode === key) return;
      viewMode = key;
      activeTab = MODE_TABS[key][0];
      addFormOpenFor = null;
      render();
    });
    wrap.appendChild(b);
  });
  el.appendChild(wrap);
  // Jahresrad ist jetzt immer sichtbar (Wunsch: fester Blickfang oben auf der Startseite).
}

/* ================= Wheel ================= */
function drawWheel(){
  const svg = document.getElementById('wheel');
  const cx=100, cy=100, r=88;
  const cur = currentSeasonKey();
  let html = '';
  SEASON_KEYS.forEach((key,i)=>{
    const a0 = (i*90 - 90) * Math.PI/180;
    const a1 = ((i+1)*90 - 90) * Math.PI/180;
    const x0 = cx + r*Math.cos(a0), y0 = cy + r*Math.sin(a0);
    const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
    const mid = (a0+a1)/2;
    const lx = cx + (r*0.62)*Math.cos(mid), ly = cy + (r*0.62)*Math.sin(mid);
    const isActive = (activeSeason || cur) === key;
    const name = t().seasons[key].name;
    html += `<path class="wheel-seg" data-key="${key}" d="M${cx},${cy} L${x0},${y0} A${r},${r} 0 0 1 ${x1},${y1} Z"
      fill="${SEASON_HEX[key]}" opacity="${isActive?1:0.45}" stroke="var(--paper)" stroke-width="3"/>`;
    html += `<text class="wheel-label" x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle">${name}</text>`;
  });
  html += `<circle cx="${cx}" cy="${cy}" r="30" fill="var(--paper)"/>`;
  svg.innerHTML = html;
  svg.querySelectorAll('.wheel-seg').forEach(seg=>{
    seg.addEventListener('click', ()=>{
      activeSeason = seg.getAttribute('data-key');
      viewMode = 'haus';
      activeTab = 'jahr';
      render();
    });
  });
}
function renderWheelInfo(){
  const key = activeSeason || currentSeasonKey();
  const s = t().seasons[key];
  document.getElementById('seasonDot').style.background = SEASON_HEX[key];
  document.getElementById('seasonName').textContent = s.name + (key===currentSeasonKey() ? t().current : '');
  document.getElementById('seasonHint').textContent = s.hint;
}

  order.forEach(key=>{

    b.className = 'tab' + (activeTab===key ? ' active':'');

    b.addEventListener('click', ()=>{ activeTab = key; addFormOpenFor = null; render(); });
    el.appendChild(b);
  });
}

function weekdayBadgeLabel(weekdays){
  const days = weekdays || [];
  if(!days.length) return t().wdBadgeNone;
  if(days.length === 7) return t().wdBadgeDaily;
  const today = new Date().getDay();
  if(days.length === 1) return fmt(t().wdBadgeSingle, {day: t().weekdayShort[days[0]]});
  if(days.includes(today)) return t().wdBadgeToday;
  const order = [1,2,3,4,5,6,0];
  return order.filter(d=>days.includes(d)).map(d=>t().weekdayShort[d]).join(', ');
}

    hapticTapIfAvailable();
    toggleTaskDone(item, st);
    render();

  if(item.b && t().bauteil[item.b]){

  titleRow.appendChild(titleLeft);
  if(item.custom){

    del.className = 'del-btn';
    del.textContent = '×';
    del.addEventListener('click', ()=>{
      if(!confirm(t().delConfirm)) return;

    titleRow.appendChild(del);

  if(opts.showReorder){
    const arrows = document.createElement('div');
    arrows.style.display = 'flex'; arrows.style.gap = '2px'; arrows.style.flex = '0 0 auto';

    const down = document.createElement('button');
    down.className = 'del-btn'; down.textContent = '▼'; down.style.fontSize = '11px';
    down.disabled = !!opts.disableDown;
    if(opts.disableDown) down.style.opacity = '0.25';
    down.addEventListener('click', opts.onDown);
    arrows.appendChild(up); arrows.appendChild(down);
    titleRow.appendChild(arrows);
  }
  body.appendChild(titleRow);

  const meta = document.createElement('div');
  meta.className = 'task-meta';

  const sel = document.createElement('select');
  sel.className = 'assignee';
  const noneOpt = document.createElement('option');
  noneOpt.value = 'none'; noneOpt.textContent = t().unassigned;
  if((st.assignee || 'none') === 'none') noneOpt.selected = true;
  sel.appendChild(noneOpt);
  people.forEach(p=>{
    const opt = document.createElement('option');
    opt.value = p.id; opt.textContent = p.name;
    if(st.assignee === p.id) opt.selected = true;
    sel.appendChild(opt);
  });
  const NEW_PERSON = '__newperson__';
  const newPersonOpt = document.createElement('option');
  newPersonOpt.value = NEW_PERSON; newPersonOpt.textContent = '+ ' + t().addPersonPh;
  sel.appendChild(newPersonOpt);
  sel.addEventListener('change', ()=>{
    if(sel.value === NEW_PERSON){
      const name = prompt(t().addPersonPh);
      const newPerson = addPerson(name);
      if(!newPerson){ sel.value = st.assignee || 'none'; return; }
      st.assignee = newPerson.id; state[item.id] = st; saveState();
      render();
      return;
    }
    st.assignee = sel.value; state[item.id] = st; saveState(); render();
  });
  meta.appendChild(sel);
  if(pColor){
    const dot = document.createElement('span');
    dot.className = 'person-dot';
    dot.style.background = pColor;
    meta.appendChild(dot);
  }

  if(item.firma){
    const firmaInput = document.createElement('input');
    firmaInput.className = 'firma-input';
    firmaInput.placeholder = t().firmaPh;
    firmaInput.maxLength = 200;
    firmaInput.value = st.firma || '';
    firmaInput.addEventListener('change', ()=>{ st.firma = firmaInput.value; state[item.id] = st; saveState(); });
    meta.appendChild(firmaInput);
  }

  if(opts.showReorder){
    // Alltag-Aufgaben: wiederkehrende Wochentage statt festem Datum — Termine laufen über den Kalender/Auto-Bereich.
    // Standardansicht: nur ein kompaktes Badge (nicht 7 Buttons permanent sichtbar).
    const wdSummary = document.createElement('div');
    wdSummary.className = 'wd-summary';
    const badge = document.createElement('span');
    badge.className = 'wd-summary-badge';
    badge.textContent = weekdayBadgeLabel(st.weekdays);
    const editBtn = document.createElement('button');
    editBtn.type = 'button';
    editBtn.className = 'wd-edit-btn';
    editBtn.setAttribute('aria-label', t().wdEditLabel);
    editBtn.textContent = '✎';
    const isEditorOpen = weekdayEditorOpenId === item.id;
    editBtn.addEventListener('click', ()=>{ weekdayEditorOpenId = isEditorOpen ? null : item.id; render(); });
    wdSummary.appendChild(badge); wdSummary.appendChild(editBtn);
    meta.appendChild(wdSummary);

    if(isEditorOpen){
      const wdRow = document.createElement('div');
      wdRow.className = 'weekday-row';
      wdRow.style.marginTop = '8px';
      const DISPLAY_ORDER = [1,2,3,4,5,6,0]; // Montag zuerst, Sonntag zuletzt
      DISPLAY_ORDER.forEach(dayIdx=>{
        const chip = document.createElement('button');
        chip.type = 'button';
        const selected = (st.weekdays || []).includes(dayIdx);
        chip.className = 'weekday-chip' + (selected ? ' active' : '');
        chip.textContent = t().weekdayShort[dayIdx];
        chip.addEventListener('click', ()=>{
          let days = st.weekdays || [];
          days = days.includes(dayIdx) ? days.filter(d=>d!==dayIdx) : [...days, dayIdx];
          st.weekdays = days; state[item.id] = st; saveState();
          render();
        });
        wdRow.appendChild(chip);
      });
      meta.appendChild(wdRow);
    }
  } else {
    const dateInput = document.createElement('input');
    dateInput.type = 'date';
    dateInput.className = 'date-input';
    dateInput.value = st.dueDate || '';
    dateInput.addEventListener('change', ()=>{ st.dueDate = dateInput.value; state[item.id] = st; saveState(); render(); });
    meta.appendChild(dateInput);
    if(st.dueDate){
      // Native Datums-Picker auf Handys starten bei leerem Feld oft auf
      // "heute" — ein zu schnelles Antippen/Wegtippen übernimmt das
      // versehentlich. Deshalb hier ein schneller Weg, das ohne erneutes
      // Scrollen durchs Rad rückgängig zu machen.
      const clearBtn = document.createElement('button');
      clearBtn.type = 'button';
      clearBtn.className = 'del-btn';
      clearBtn.title = t().clearDate;
      clearBtn.textContent = '×';
      clearBtn.addEventListener('click', ()=>{ st.dueDate = ''; state[item.id] = st; saveState(); render(); });
      meta.appendChild(clearBtn);
      const wd = document.createElement('span');
      wd.className = 'weekday-badge';
      const dow = new Date(st.dueDate + 'T00:00:00').getDay();
      wd.textContent = t().weekdayShort[dow];
      meta.appendChild(wd);
    }
  }

  const last = document.createElement('span');
  const da = daysAgo(st.lastDoneAt);
  last.textContent = da===null ? t().neverDone : (da===0 ? t().doneToday : fmt(t().daysAgoTpl,{n:da}));
  meta.appendChild(last);

  body.appendChild(meta);

  if(disp.why){
    const why = document.createElement('div');
    why.className = 'why-tip';
    why.innerHTML = `<span class="why-icon">🔍</span><span></span>`;
    why.querySelector('span:last-child').textContent = disp.why;
    body.appendChild(why);
  }

  const detailsBtn = document.createElement('button');
  detailsBtn.className = 'details-toggle';
  const hasDetailData = st.cost || st.notes || st.intervalDays;
  const isOpen = expandedDetails.has(item.id);
  detailsBtn.textContent = (isOpen ? '▾ ' : '▸ ') + t().detailsToggle + (hasDetailData && !isOpen ? ' •' : '');
  detailsBtn.addEventListener('click', ()=>{
    if(expandedDetails.has(item.id)) expandedDetails.delete(item.id);
    else expandedDetails.add(item.id);
    render();
  });
  body.appendChild(detailsBtn);

  if(isOpen){
    const panel = document.createElement('div');
    panel.className = 'details-panel';

    const costRow = document.createElement('div');
    costRow.className = 'details-row';
    const costLabel = document.createElement('label'); costLabel.textContent = t().costLabel;
    const costInput = document.createElement('input');
    costInput.type = 'number'; costInput.min = '0'; costInput.placeholder = '0';
    costInput.value = st.cost || '';

      intervalRow.appendChild(intervalLabel); intervalRow.appendChild(intervalInput);
      panel.appendChild(intervalRow);
    }

    const notesRow = document.createElement('div');
    notesRow.className = 'details-row';
    const notesLabelEl = document.createElement('label'); notesLabelEl.textContent = t().notesLabel;
    const notesInput = document.createElement('input');

    notesInput.addEventListener('change', ()=>{ st.notes = notesInput.value; state[item.id] = st; saveState(); });
    notesRow.appendChild(notesLabelEl); notesRow.appendChild(notesInput);
    panel.appendChild(notesRow);

    body.appendChild(panel);
  }

  row.appendChild(check);
  row.appendChild(body);
  return row;
}

function removeCustomTask(item){
  if(item.categoryPath[0] === 'jahr'){
    const arr = customTasks.jahr[item.categoryPath[1]];
    customTasks.jahr[item.categoryPath[1]] = arr.filter(x=>x.id!==item.id);
    markRemoved('customTasks:jahr:'+item.categoryPath[1], item.id);
  } else {
    customTasks[item.categoryPath[0]] = customTasks[item.categoryPath[0]].filter(x=>x.id!==item.id);
    markRemoved('customTasks:'+item.categoryPath[0], item.id);
  }
  delete state[item.id];
  saveCustomTasks(); saveState(); render();
}

      const opt = document.createElement('option');
      opt.value = bk; opt.textContent = t().bauteil[bk];
      if(bk === 'haushalt') opt.selected = true;
      bauteilSelect.appendChild(opt);
    });
    form.appendChild(bauteilSelect);

    const row = document.createElement('div');
    row.className = 'row';
    const chkLabel = document.createElement('label');
